function addWidget(type,index=elements.length){
  const selected = selectedId ? findElementDeep(selectedId) : null;
  let targetList = elements;
  let targetIndex = index;
  if(selected){
    if(selected.element.type === 'container'){
      targetList = getContainerChildren(selected.element.id) || elements;
      targetIndex = targetList.length;
    } else if(selected.list){
      targetList = selected.list;
      targetIndex = selected.index + 1;
    }
  }
  const safeIndex = Math.max(0, Math.min(targetIndex, targetList.length));
  const newEl = type === 'columns' ? createColumnsElement() : Object.assign({id:uid(),type},defaultsFor(type));
  ensureTreeDefaults([newEl]);
  targetList.splice(safeIndex,0,newEl);
  selectedId=newEl.id;
  pushHistory();
  renderAll();
  openSettingsFor(newEl.id);
  showToast((WIDGETS.find(w=>w.type===type)||{label:type}).label+' added');
}

renderPalette=function(filter=''){
  const library=document.getElementById('widgetLibrary'), term=filter.toLowerCase().trim();
  library.innerHTML='';
  const filtered=WIDGETS.filter(w=>w.label.toLowerCase().includes(term)||w.category.toLowerCase().includes(term));
  if(!filtered.length){library.innerHTML='<div class="empty-search">No elements match your search.</div>';return;}
  [...new Set(filtered.map(w=>w.category))].forEach(category=>{
    const title=document.createElement('div');title.className='widget-category';const count=filtered.filter(w=>w.category===category).length;title.innerHTML=`<span>${category}</span><small>${count} elements</small>`;library.appendChild(title);
    const grid=document.createElement('div');grid.className='widget-grid';
    filtered.filter(w=>w.category===category).forEach(w=>{
      const card=document.createElement('div');card.className='widget-card';card.draggable=true;card.title='Click to add at the end, or drag to a precise position';
      card.innerHTML=`<div class="widget-icon">${svgIcon(w.icon,17)}</div><span>${w.label}</span>`;

function ensureTreeDefaults(list){
  list = migrateLegacyColumns(list || []);
  (list||[]).forEach(el=>{
    el.box = el.box || defaultBox();
    el.advanced = el.advanced || defaultAdvanced();
    ensureElementResponsiveState(el);
    if(el.type==='container'){
      el.content = el.content || { name:'Container' };
      el.style = { flow:'column', gap:0, justify:'flex-start', alignItems:'stretch', ...(el.style||{}) };
      el.children = Array.isArray(el.children) ? el.children : [];
      el.box.flexGrow = Number(el.box.flexGrow || 0);
      el.children = ensureTreeDefaults(el.children);
    }
  });
  return list;
}

function visitElements(list, visitor, parentId=''){

    if(Array.isArray(el.children) && el.children.length){

function findElementDeep(id, list=elements, parentId=''){

    const el=list[i];
    if(el.id===id) return { element: el, list, index: i, parentId };
    if(Array.isArray(el.children) && el.children.length){
      const found=findElementDeep(id, el.children, el.id);
      if(found) return found;
    }
  }
  return null;
}

function getContainerChildren(parentId){
  if(!parentId) return elements;
  const found = findElementDeep(parentId);
  if(!found) return null;
  found.element.children = Array.isArray(found.element.children) ? found.element.children : [];
  return found.element.children;
}

function cloneElementTree(el){

    node.box = node.box || defaultBox();
    node.advanced = node.advanced || defaultAdvanced();
    if(Array.isArray(node.children)) node.children.forEach(remap);

  return copy;
}

function subtreeContainsId(el, id){

  return Array.isArray(el.children) && el.children.some(child => subtreeContainsId(child, id));

wireCanvasEvents = function(){
  canvasPage.querySelectorAll('.el-wrap').forEach(wrap=>{
    const id = wrap.dataset.id;
    wrap.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(isImportedExactPageMode() && e.target.closest('.custom-html-widget') && !e.target.closest('.el-controls')){
        const importedTarget = getImportedSelectableNode(e.target);
        if(importedTarget){
          selectImportedNode(importedTarget);
          return;
        }
      }
      if(e.target.closest('.drop-zone')) return;
      selectElement(id);
    });
    wrap.addEventListener('dragstart', (e)=>{
      dragPayload = { kind:'move', id, fromParentId: wrap.dataset.parentId || '' };
      wrap.classList.add('dragging-el');
      setDraggingBuilderState(true);
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    });
    wrap.addEventListener('dragend', ()=>{
      wrap.classList.remove('dragging-el');
      dragPayload = null;
      setDraggingBuilderState(false);
    });
    const dup = wrap.querySelector('.dup-el');
    const del = wrap.querySelector('.del-el');
    if(dup) dup.addEventListener('click', (e)=>{ e.stopPropagation(); duplicateElement(id); });
    if(del) del.addEventListener('click', (e)=>{ e.stopPropagation(); deleteElement(id); });
  });

wireDropZones = function(){
  canvasPage.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.addEventListener('dragover', (e)=>{
      e.preventDefault();
      zone.classList.add('active-zone');
    });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('active-zone'));
      zone.addEventListener('drop', (e)=>{
        e.preventDefault();
        zone.classList.remove('active-zone');
        setDraggingBuilderState(false);
        if(!dragPayload) return;
      if(isImportedExactPageMode() && dragPayload.kind === 'new'){
        const importedDropTarget = getImportedDropTargetFromEvent(e);
        insertImportedWidget(dragPayload.widgetType, importedDropTarget, e);
        dragPayload = null;
        return;
      }
      const parentId = zone.dataset.parentId || '';
      const targetIndex = parseInt(zone.dataset.index || '0', 10);
      const targetList = getContainerChildren(parentId);
      if(!targetList) return;

      if(dragPayload.kind === 'new'){
        const newEl = dragPayload.widgetType === 'columns'
          ? createColumnsElement()
          : Object.assign({ id: uid(), type: dragPayload.widgetType, advanced:{} }, defaultsFor(dragPayload.widgetType));
        ensureTreeDefaults([newEl]);
        targetList.splice(targetIndex, 0, newEl);
        selectedId = newEl.id;
        pushHistory();
        renderAll();
        openSettingsFor(newEl.id);
      } else if(dragPayload.kind === 'move'){
        const found = findElementDeep(dragPayload.id);
        if(!found) return;
        if(parentId && subtreeContainsId(found.element, parentId)) return;
        const sameList = found.list === targetList;
        const [moved] = found.list.splice(found.index, 1);
        const adjustedIndex = sameList && found.index < targetIndex ? targetIndex - 1 : targetIndex;
        targetList.splice(Math.max(0, adjustedIndex), 0, moved);
        pushHistory();
        renderAll();
      }
      dragPayload = null;
    });
  });
};

duplicateElement = function(id){
  const found = findElementDeep(id);
  if(!found) return;
  const copy = cloneElementTree(found.element);
  found.list.splice(found.index + 1, 0, copy);
  pushHistory();
  selectedId = copy.id;
  renderAll();
  openSettingsFor(copy.id);
  showToast('Widget duplicated');
};

deleteElement = function(id){
  const found = findElementDeep(id);
  if(!found) return;
  found.list.splice(found.index, 1);
  if(selectedId===id) selectedId=null;
  pushHistory();
  renderAll();
  if(selectedId===null) switchLeftView('elements');
  showToast('Widget deleted');
};

selectElement = function(id){
  selectedId = id;
  document.querySelectorAll('.el-wrap').forEach(w=> w.classList.toggle('selected', w.dataset.id===id));
  openSettingsFor(id);
};

renderLayers = function(){
  const list = document.getElementById('layersList');

    items.forEach(el=>{
      const w = WIDGETS.find(item=>item.type===el.type) || {label:el.type, icon:'heading'};
      const row = document.createElement('div');

  if(!found) return;
  let el = found.element;
  if(el.type === 'columns'){
    const migrated = createColumnsElement(el.content?.left || '', el.content?.right || '');

function responsiveMarkupStyleRules(el, device){
  const viewEl = resolveElementForDevice(el, device);
  const prefix = `.published-widget.${cssSafeElementClass(el.id)}`;
  const rules = [];
  const wrapperDeclarations = importantDeclarations(composeWrapStyle(viewEl));
  if(wrapperDeclarations) rules.push(`${prefix}{${wrapperDeclarations}}`);
  if(isHiddenForDevice(el, device)) rules.push(`${prefix}{display:none!important;}`);

  if(el.type === 'container'){
    const s = viewEl.style || {};
    rules.push(`${prefix}>.container-shell{display:flex!important;flex-direction:${s.flow==='row'?'row':'column'}!important;gap:${Number(s.gap||0)}px!important;justify-content:${s.justify||'flex-start'}!important;align-items:${s.alignItems||'stretch'}!important;}`);

  mount.innerHTML = elementInnerHTML(viewEl);
  mount.querySelectorAll('[style]').forEach((node)=>{
    const path = [];
    let current = node;
    while(current && current.parentElement && current.parentElement !== mount){
      const parent = current.parentElement;
      path.unshift(`>:nth-child(${Array.from(parent.children).indexOf(current)+1})`);
      current = parent;

    if(current && current.parentElement === mount){
      path.unshift(`>:nth-child(${Array.from(mount.children).indexOf(current)+1})`);

function getBridgeState(saveMode=''){
  // The visualBuilder snapshot is the first source used when a saved page is
  // reopened. Capture the current imported DOM immediately before save/publish
  // so a stale element.content.code cannot overwrite the newly published HTML.
  if(isImportedExactPageMode()){
    const root = getImportedHtmlRoot();
    const model = getImportedHtmlElementModel();
    if(root && model) model.content.code = importedResponsiveModelHtml(root);
  }
  return { snapshot: snapshot(), publishedHtml: buildPublishedHtml(), selectedId, saveMode };
}

function describeImportedDebugTarget(node){
  if(!node || node.nodeType!==1) return { exists: false, value: String(node || '') };
  let rect = {};
  try{
    const box = node.getBoundingClientRect();
    rect = { width: Math.round(box.width), height: Math.round(box.height), top: Math.round(box.top), left: Math.round(box.left) };
  }catch{}
  const tag = String(node.tagName || '').toLowerCase();
  return {
    exists: true,
    tag,
    id: node.getAttribute('id') || '',
    importId: node.getAttribute('data-import-id') || '',
    className: String(node.getAttribute('class') || '').slice(0, 180),
    src: tag === 'img' ? (node.getAttribute('src') || '') : '',
    srcset: tag === 'img' ? (node.getAttribute('srcset') || '') : '',
    dataSrc: node.getAttribute('data-src') || node.getAttribute('data-lazy-src') || '',
    background: importedNodeBackgroundSource(node),
    inlineStyle: String(node.getAttribute('style') || '').slice(0, 260),
    rect
  };
}
function serializeImportedEditorError(error){
  if(!error) return {};
  return {
    name: error.name || 'Error',
    message: error.message || String(error),
    stack: error.stack || ''
  };
}
function reportImportedEditorError(stage, details={}){
  const payload = {
    stage,
    details: {
      ...details,
      error: serializeImportedEditorError(details.error)
    }
  };
  console.error('[MWU imported editor diagnostic]', payload);
  notifyHost('MWU_IMPORTED_EDITOR_ERROR', payload);
}

  `;
}
function loadHostSnapshot(data={}){
  const nextPageSettings=data.pageSettings&&typeof data.pageSettings==='object'?data.pageSettings:{};
  pageSettings={...pageSettings,...nextPageSettings};
  hostImportCssLinks = Array.isArray(data.importCssLinks)?data.importCssLinks:[];
  hostImportInlineCss = String(data.importInlineCss || '');
  hostLiveAssetProxyPrefix = data.liveAssetProxyPrefix || hostLiveAssetProxyPrefix;
  hostLiveSiteOrigin = data.liveSiteOrigin || hostLiveSiteOrigin;
  console.info('[MWU editor debug] iframe:load-payload', {
    elementCount: Array.isArray(data.elements) ? data.elements.length : 0,
    firstElementType: data.elements && data.elements[0] ? data.elements[0].type : '',
    exactImport: !!pageSettings.exactImport,
    importCssCount: hostImportCssLinks.length,
    importInlineCssLength: hostImportInlineCss.length,
    htmlBytes: data.elements && data.elements[0] && data.elements[0].content ? String(data.elements[0].content.code || '').length : 0
  });
  syncHostStylesheets(hostImportCssLinks, hostImportInlineCss);
  if(Array.isArray(data.elements)) elements=migrateLegacyColumns(data.elements);
  if(data.device) currentDevice=data.device;
  document.body.classList.toggle('imported-page-mode', !!pageSettings.exactImport);
  clearImportedSelection();
  selectedId=null;
  history=[];historyIndex=-1;
  syncPageSettingsToUi();
  document.querySelectorAll('[data-device]').forEach(b=>b.classList.toggle('active',b.dataset.device===currentDevice));
  canvasPage.classList.toggle('tablet',currentDevice==='tablet');
  canvasPage.classList.toggle('mobile',currentDevice==='mobile');
  _pushHistory();
  renderAll();
  updateHistoryButtons();
  saveDraft(true);
}
window.addEventListener('message',event=>{
  const data=event.data||{};
  if(data.type==='MWU_HTML_BUILDER_INIT'){
    loadHostSnapshot(data.payload||{});
    notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState());
    return;
  }
  if(data.type==='MWU_HTML_BUILDER_REQUEST_STATE'){
    notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState());
    return;
  }
  if(data.type==='MWU_REPLACE_IMAGE_SOURCE'){
    try{
      const root = getImportedHtmlRoot();
      console.info('[MWU imported editor] replace request received', { elementId: data.elementId, src: data.src, hasRoot: !!root });
      if(!root){
        reportImportedEditorError('replace-missing-import-root', { elementId: data.elementId, src: data.src });
        return;
      }
      if(!data.elementId || !data.src){
        reportImportedEditorError('replace-missing-element-or-src', { elementId: data.elementId, src: data.src });
        return;
      }
      const originalTarget = findImportedNodeById(root, data.elementId);
      const target = resolveImportedMediaTargetById(root, data.elementId);
      if(!target){
        reportImportedEditorError('replace-target-not-found', {
          elementId: data.elementId,
          src: data.src,
          rootImageCount: root.querySelectorAll('img').length,
          rootBackgroundCount: Array.from(root.querySelectorAll('*')).filter(isImportedBackgroundMediaNode).length,
          originalTarget: describeImportedDebugTarget(originalTarget)
        });
        return;
      }
      const replaced = setImportedMediaSource(target, data.src);
      if(!replaced){
        reportImportedEditorError('replace-mutation-returned-false', {
          elementId: data.elementId,
          src: data.src,
          originalTarget: describeImportedDebugTarget(originalTarget),
          resolvedTarget: describeImportedDebugTarget(target)
        });
        return;
      }
      syncImportedHtmlToModel('imported-image-library', true);
      selectImportedNode(target);
      renderImportedSettings(target);
      showToast('Image replaced');
    }catch(error){
      reportImportedEditorError('replace-handler-failed', { elementId: data.elementId, src: data.src, error });
    }
  }
});
notifyHost('MWU_HTML_BUILDER_READY', { instanceKey: BUILDER_INSTANCE_KEY });

document.querySelector('.side-panel').addEventListener('click',e=>e.stopPropagation());
document.querySelector('.topbar').addEventListener('click',e=>e.stopPropagation());
document.getElementById('modalBox').addEventListener('click',e=>e.stopPropagation());

// Replace demo-only top bar actions with real standalone behaviour.
document.getElementById('saveDraftBtn').addEventListener('click',()=>{pageSettings.status='draft';saveDraft(false);showToast('Draft sent to the database');notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState('draft'));});document.getElementById('publishBtn').addEventListener('click',()=>{pageSettings.status='published';saveDraft(true);showToast('Published page sent to the database');notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState('publish'));});document.getElementById('templateBtn').addEventListener('click',showTemplates);document.getElementById('pageSettingsBtn').addEventListener('click',showPageSettings);document.getElementById('helpBtn').addEventListener('click',showHelp);
const exportBtn=document.createElement('button');exportBtn.className='tb-icon-btn';exportBtn.title='Export / import';exportBtn.innerHTML=svgIcon('download',16);exportBtn.addEventListener('click',showExport);document.getElementById('pageSettingsBtn').after(exportBtn);
document.getElementById('zoomSelect').addEventListener('change',e=>{canvasPage.style.transform=`scale(${e.target.value})`;canvasPage.style.marginBottom=`${(Number(e.target.value)-1)*canvasPage.offsetHeight}px`;});

document.addEventListener('keydown',e=>{
  const typing=['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable;if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();saveDraft(false)}
  if(!typing&&(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();undo()}
  if(!typing&&(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'){e.preventDefault();redo()}
  if(!typing&&(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='d'&&(selectedId||importedSelectionNode)){e.preventDefault();if(importedSelectionNode) duplicateImportedSelection(); else duplicateElement(selectedId)}
  if(!typing&&e.key==='Delete'&&(selectedId||importedSelectionNode)){e.preventDefault();if(importedSelectionNode) deleteImportedSelection(); else deleteElement(selectedId)}
  if(e.key==='Escape'){if(document.getElementById('modalBackdrop').classList.contains('open'))closeModal();else if(document.body.classList.contains('preview-mode'))document.getElementById('previewBtn').click();else deselectAll()}
});
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});

// Restore local draft only when the builder is opened standalone, not when the CRM hosts a real page payload.
if(!IS_HOSTED_BUILDER && restoreDraft()){
  syncPageSettingsToUi();
  document.querySelectorAll('[data-device]').forEach(b=>b.classList.toggle('active',b.dataset.device===currentDevice));canvasPage.classList.toggle('tablet',currentDevice==='tablet');canvasPage.classList.toggle('mobile',currentDevice==='mobile');
  history=[];historyIndex=-1;_pushHistory();
}
syncPageSettingsToUi();renderPalette(document.getElementById('widgetSearch').value||'');renderAll();updateHistoryButtons();saveDraft(true);

</script>
