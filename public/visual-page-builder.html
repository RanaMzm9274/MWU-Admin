<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Madda Walabu University — CRM Portal · Visual Page Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-900:#0B1830; --navy-800:#122544; --navy-700:#1B3059;
    --gold-600:#B9862E; --gold-500:#C99A3B; --gold-100:#F6EDDB; --gold-050:#FBF6EB;
    --bg:#EEF0F3; --panel:#FFFFFF; --line:#E4E7ED; --line-soft:#EDEFF3;
    --ink-900:#161D2B; --ink-600:#4B5468; --ink-400:#8A93A6;
    --green-600:#1F8A5F; --green-100:#E4F5EC; --red-600:#C23B3B; --red-100:#FBE8E8;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.05);
    --shadow-md: 0 6px 20px rgba(15,23,42,0.09);
    --shadow-lg: 0 20px 50px rgba(11,24,48,0.28);
    --radius: 10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{ font-family:'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--ink-900); -webkit-font-smoothing:antialiased; font-size:13.5px; overflow:hidden; }
  button, select, input, textarea{ font-family:inherit; }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-thumb{ background:#D3D7DE; border-radius:6px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  .app{ display:flex; flex-direction:column; height:100vh; }

  /* ============ TOP BAR ============ */
  .topbar{
    height:52px; flex-shrink:0; background: var(--navy-900); color:#fff;
    display:flex; align-items:center; justify-content:space-between; padding: 0 14px;
    box-shadow: var(--shadow-md); position:relative; z-index:20;
  }
  .tb-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .tb-mark{ width:30px; height:30px; border-radius:8px; background: radial-gradient(circle at 35% 30%, #2a4372, #0B1830 70%); border:1.5px solid var(--gold-500); display:flex; align-items:center; justify-content:center; font-family:'Fraunces', serif; font-weight:600; color: var(--gold-500); font-size:12px; flex-shrink:0; }
  .tb-crumb{ font-size:12px; color: rgba(255,255,255,.55); display:flex; align-items:center; gap:6px; min-width:0; }
  .tb-crumb b{ color:#fff; font-weight:700; }
  .tb-crumb svg{ width:12px; height:12px; flex-shrink:0; opacity:.5; }
  .tb-page-name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }

  .tb-center{ display:flex; align-items:center; gap:4px; background: rgba(255,255,255,0.06); border-radius:9px; padding:3px; }
  .tb-icon-btn{ width:32px; height:32px; border-radius:7px; border:none; background:transparent; color: rgba(255,255,255,.65); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.13s ease; }
  .tb-icon-btn svg{ width:16px; height:16px; }
  .tb-icon-btn:hover{ background: rgba(255,255,255,0.1); color:#fff; }
  .tb-icon-btn.active{ background: var(--gold-500); color: var(--navy-900); }
  .tb-icon-btn:disabled{ opacity:.3; cursor:not-allowed; }
  .tb-sep{ width:1px; height:20px; background: rgba(255,255,255,.15); margin:0 3px; }

  .tb-right{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .btn{ font-weight:700; font-size:12.5px; border-radius:8px; padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; border:1px solid transparent; transition:.13s ease; white-space:nowrap; }
  .btn svg{ width:14px; height:14px; flex-shrink:0; }
  .btn:active{ transform: scale(0.96); }
  .btn-gold{ background: var(--gold-500); color: var(--navy-900); }
  .btn-gold:hover{ background:#D6A94E; }
  .btn-ghost-dark{ background: rgba(255,255,255,0.07); color:#fff; border-color: rgba(255,255,255,0.16); }
  .btn-ghost-dark:hover{ background: rgba(255,255,255,0.15); }
  .btn-exit{ background:transparent; color: rgba(255,255,255,.65); }
  .btn-exit:hover{ color:#fff; }

  /* ============ WORKSPACE ============ */
  .workspace{ flex:1; display:flex; min-height:0; }

  /* ============ LEFT PANEL ============ */
  .side-panel{
    width:300px; flex-shrink:0; background:#fff; border-right:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0; position:relative; z-index:10;
    box-shadow: 2px 0 12px rgba(15,23,42,0.04);
  }
  .panel-view{ display:none; flex-direction:column; min-height:0; flex:1; }
  .panel-view.active{ display:flex; }

  /* -- Elements view -- */
  .panel-topbar{ display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--line-soft); flex-shrink:0; }
  .panel-search{ flex:1; display:flex; align-items:center; gap:8px; background: var(--line-soft); border:1px solid var(--line); border-radius:8px; padding:8px 11px; }
  .panel-search svg{ width:14px; height:14px; color: var(--ink-400); flex-shrink:0; }
  .panel-search input{ border:none; outline:none; background:transparent; font-size:12.5px; width:100%; }
  .panel-mode-btn{ width:34px; height:34px; border-radius:8px; border:1px solid var(--line); background:#fff; color: var(--ink-600); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.13s ease; }
  .panel-mode-btn svg{ width:15px; height:15px; }
  .panel-mode-btn:hover, .panel-mode-btn.active{ background: var(--navy-900); color:#fff; border-color: var(--navy-900); }

  .panel-section-label{ padding:12px 14px 6px; font-size:10.5px; font-weight:700; letter-spacing:.08em; color: var(--gold-600); text-transform:uppercase; }
  .widget-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding: 4px 14px 18px; overflow-y:auto; }
  .widget-card{
    border:1px solid var(--line); border-radius:10px; padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:8px;
    cursor:grab; background:#fff; transition:.13s ease; text-align:center;
  }
  .widget-card:hover{ border-color: var(--gold-500); background: var(--gold-050); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .widget-card.dragging{ opacity:.35; }
  .widget-icon{ width:34px; height:34px; border-radius:9px; background: var(--navy-900); color: var(--gold-500); display:flex; align-items:center; justify-content:center; }
  .widget-icon svg{ width:17px; height:17px; }
  .widget-card span{ font-size:11.3px; font-weight:700; color: var(--ink-900); line-height:1.3; }

  /* -- Layers view -- */
  .layers-list{ flex:1; overflow-y:auto; padding:8px; }
  .layer-row{ display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; cursor:pointer; transition:.12s ease; }
  .layer-row:hover{ background: var(--line-soft); }
  .layer-row.selected{ background: var(--gold-050); border:1px solid var(--gold-100); }
  .layer-row .li-icon{ width:24px; height:24px; border-radius:6px; background: var(--line-soft); color: var(--ink-600); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .layer-row .li-icon svg{ width:12px; height:12px; }
  .layer-row .li-label{ flex:1; font-size:12.5px; font-weight:600; color: var(--ink-900); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .layer-row .li-del{ width:22px; height:22px; border-radius:6px; border:none; background:transparent; color: var(--ink-400); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .layer-row .li-del:hover{ background: var(--red-100); color:#d33; }
  .layer-row .li-del svg{ width:12px; height:12px; }
  .layers-empty{ text-align:center; padding:50px 20px; color: var(--ink-400); font-size:12.5px; line-height:1.6; }
  .layers-empty svg{ width:28px; height:28px; color: var(--line); margin-bottom:10px; }

  /* -- Settings view -- */
  .settings-header{ display:flex; align-items:center; gap:10px; padding:13px 14px; border-bottom:1px solid var(--line-soft); flex-shrink:0; }
  .settings-back{ width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:#fff; color: var(--ink-600); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .settings-back:hover{ background: var(--line-soft); }
  .settings-back svg{ width:15px; height:15px; }
  .settings-icon{ width:32px; height:32px; border-radius:8px; background: var(--navy-900); color: var(--gold-500); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .settings-icon svg{ width:15px; height:15px; }
  .settings-title{ flex:1; min-width:0; }
  .settings-title .t{ font-weight:700; font-size:13px; color: var(--ink-900); }
  .settings-title .s{ font-size:10.8px; color: var(--ink-400); }
  .settings-actions{ display:flex; gap:4px; flex-shrink:0; }
  .sa-btn{ width:28px; height:28px; border-radius:7px; border:1px solid var(--line); background:#fff; color: var(--ink-600); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .sa-btn svg{ width:13px; height:13px; }
  .sa-btn:hover{ background: var(--line-soft); }
  .sa-btn.danger:hover{ background: var(--red-100); color:#d33; border-color:#f3c9c9; }

  .settings-tabs{ display:flex; border-bottom:1px solid var(--line-soft); flex-shrink:0; }
  .settings-tab{ flex:1; padding:11px 4px; text-align:center; font-size:11.5px; font-weight:700; color: var(--ink-400); background:none; border:none; cursor:pointer; border-bottom:2.5px solid transparent; transition:.13s ease; }
  .settings-tab:hover{ color: var(--navy-900); background: var(--gold-050); }
  .settings-tab.active{ color: var(--navy-900); border-bottom-color: var(--gold-500); }

  .settings-body{ flex:1; overflow-y:auto; padding: 16px 16px 30px; }
  .settings-panel-tab{ display:none; }
  .settings-panel-tab.active{ display:block; }

  .field-group{ margin-bottom:18px; }
  .field-group-label{ font-size:11px; font-weight:700; color: var(--ink-900); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .field-group-label .val{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color: var(--gold-600); font-weight:600; }
  .field-input, .field-select, .field-textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:12.5px; color: var(--ink-900); background:#fff; transition:.13s ease;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus{ outline:none; border-color: var(--gold-500); box-shadow: 0 0 0 3px rgba(201,154,59,0.14); }
  .field-textarea{ resize:vertical; min-height:64px; line-height:1.5; }
  .field-select{ cursor:pointer; }
  .field-hint{ font-size:10.5px; color: var(--ink-400); margin-top:12px; line-height:1.6; text-align:center; padding: 10px; background: var(--line-soft); border-radius:8px; }

  .range-row{ display:flex; align-items:center; gap:10px; }
  input[type="range"]{ flex:1; accent-color: var(--gold-500); cursor:pointer; }
  input[type="color"]{ width:36px; height:32px; border:1px solid var(--line); border-radius:7px; padding:2px; cursor:pointer; background:#fff; flex-shrink:0; }
  .color-field-row{ display:flex; align-items:center; gap:9px; }
  .color-field-row .field-input{ flex:1; font-family:'IBM Plex Mono', monospace; font-size:11.5px; }

  .btn-group{ display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .btn-group button{ flex:1; padding:8px 4px; background:#fff; border:none; border-right:1px solid var(--line); color: var(--ink-600); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.13s ease; }
  .btn-group button:last-child{ border-right:none; }
  .btn-group button svg{ width:14px; height:14px; }
  .btn-group button:hover{ background: var(--line-soft); }
  .btn-group button.active{ background: var(--navy-900); color:#fff; }

  .preset-swatches{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .preset-swatch{ width:38px; height:38px; border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer; }
  .preset-swatch img{ width:100%; height:100%; object-fit:cover; }
  .preset-swatch.active{ border-color: var(--gold-500); }

  .spacing-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .dimension-stack{display:grid;gap:10px}
  .slider-unit-row{display:grid;grid-template-columns:minmax(0,1fr);gap:8px;align-items:center}
  .field-group-label .metric-input-wrap{
    margin-left:auto;
    display:inline-grid;
    grid-template-columns:minmax(62px,1fr) 54px;
    width:min(154px,58%);
    min-width:128px;
    height:34px;
    overflow:hidden;
    align-items:stretch;
    border:1px solid var(--line);
    border-radius:999px;
    background:#fff;
    box-shadow:0 1px 2px rgba(8,17,34,0.04);
  }
  .field-group-label .metric-input-wrap:focus-within{
    border-color:var(--gold-500);
    box-shadow:0 0 0 3px rgba(201,154,59,0.14);
  }
  .field-input.metric-value-input{
    width:100%;
    height:32px;
    min-height:32px;
    border:0;
    border-radius:0;
    padding:4px 8px 4px 12px;
    text-align:right;
    font-size:12px;
    font-weight:800;
    background:transparent;
    box-shadow:none;
  }
  .field-input.metric-value-input:focus{box-shadow:none}
  .field-input.metric-value-input::-webkit-outer-spin-button,
  .field-input.metric-value-input::-webkit-inner-spin-button{margin:0}
  .field-select.unit-value-select{
    width:54px;
    min-width:54px;
    max-width:54px;
    height:32px;
    border:0;
    border-left:1px solid var(--line);
    border-radius:0;
    padding:4px 18px 4px 7px;
    font-size:11px;
    font-weight:800;
    line-height:1;
    color:var(--navy-900);
    background-color:#f8fafc;
    box-shadow:none;
  }
  .field-select.unit-value-select:focus{box-shadow:none}
  .linked-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .linked-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .clip-toggle{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;font-size:10px;font-weight:800;cursor:pointer;color:var(--ink-600)}
  .clip-toggle.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900)}
  .quad-field label{font-size:10px;font-weight:700;color:var(--ink-400);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
  .spacing-field label{ font-size:10px; font-weight:700; color: var(--ink-400); text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:5px; }
  .stepper-field{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .stepper-field input{width:100%;border:none;outline:none;padding:8px 10px;font-size:12.5px;background:transparent}
  .stepper-buttons{display:flex;flex-direction:column;border-left:1px solid var(--line);background:var(--line-soft)}
  .stepper-buttons button{width:30px;height:18px;border:none;background:transparent;color:var(--ink-600);cursor:pointer;font-size:11px;font-weight:800;line-height:1}
  .stepper-buttons button:hover{background:#e4e7ed;color:var(--navy-900)}
  .align-stack{display:grid;gap:10px}
  .align-axis-label{display:block;margin-bottom:6px;color:var(--ink-400);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}

  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding: 10px 0; border-bottom:1px solid var(--line-soft); }
  .toggle-row:last-child{ border-bottom:none; }
  .toggle-row label{ font-size:12px; font-weight:600; color: var(--ink-600); }
  .switch{ position:relative; width:38px; height:22px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch-track{ position:absolute; inset:0; background: var(--line); border-radius:20px; cursor:pointer; transition:.15s ease; }
  .switch-track::before{ content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s ease; box-shadow: var(--shadow-sm); }
  .switch input:checked + .switch-track{ background: var(--gold-500); }
  .switch input:checked + .switch-track::before{ transform: translateX(16px); }

  /* ============ CANVAS ============ */
  .canvas-area{ flex:1; overflow-y:auto; overflow-x:hidden; background:#ffffff; padding: 34px 30px 100px; display:flex; justify-content:center; }
  .canvas-page{
    width:100%; max-width:1180px; background:#fff; border-radius:14px; box-shadow: var(--shadow-md);
    min-height:600px; transition: max-width .25s ease; padding: 0; position:relative;
  }
  .canvas-page.tablet{ max-width:760px; }
  .canvas-page.mobile{ max-width:380px; }
  body.imported-page-mode .canvas-page{
    max-width:min(100%,1180px);
    padding:0;
    border-radius:0;
    box-shadow:none;
    background:#ffffff;
  }
  body.imported-page-mode .canvas-page.tablet{ max-width:760px; }
  body.imported-page-mode .canvas-page.mobile{ max-width:380px; }
  body.imported-page-mode .canvas-page-grid{
    background-image:none;
  }
  body.imported-page-mode .el-wrap{
    margin:0;
  }
  body.imported-page-mode .el-inner{
    width:100% !important;
    max-width:100% !important;
  }
  body.imported-page-mode .custom-html-widget{
    width:100%;
  }
  body.imported-page-mode .custom-html-widget [data-import-selected="true"]{
    outline:2px solid var(--gold-500) !important;
    outline-offset:2px !important;
    box-shadow:0 0 0 4px rgba(201,154,59,0.14) !important;
  }
  body.imported-page-mode .custom-html-widget [data-import-hoverable="true"]:hover{
    outline:1px dashed rgba(201,154,59,0.45);
    outline-offset:2px;
  }
  body.imported-page-mode .canvas-page .custom-html-widget [data-import-overlay-skip="true"]{
    pointer-events:none !important;
  }
  body.imported-page-mode .canvas-page .custom-html-widget [data-import-overlay-skip="true"]::before,
  body.imported-page-mode .canvas-page .custom-html-widget [data-import-overlay-skip="true"]::after{
    pointer-events:none !important;
  }
  body.imported-page-mode .canvas-page .custom-html-widget [data-import-overlay-skip="true"]:hover{
    outline:none !important;
  }
  body.imported-page-mode .custom-html-widget [data-import-drop-target="true"]{
    outline:2px dashed var(--gold-500) !important;
    outline-offset:-3px !important;
  }
  body.imported-page-mode .custom-html-widget img{
    max-width:100%;
    height:auto;
  }
  .responsive-edit-notice{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin:0 0 14px;
    padding:10px 11px;
    border:1px solid #e7c979;
    border-radius:9px;
    background:#fff9e9;
    color:#6d5313;
  }
  .responsive-edit-notice strong{
    font-size:11px;
    white-space:nowrap;
  }
  .responsive-edit-notice span{
    font-size:10px;
    line-height:1.45;
    text-align:right;
  }

  .drop-zone{ height:0; margin:0; border-radius:6px; transition:.13s ease; position:relative; overflow:hidden; }
  .drop-zone.active-zone{ height:44px; background: var(--gold-050); border:1.5px dashed var(--gold-500); display:flex; align-items:center; justify-content:center; overflow:visible; }
  .drop-zone.active-zone::after{ content:'Drop widget here'; font-size:11px; font-weight:700; color: var(--gold-600); }
  body.dragging-builder .drop-zone{ height:14px; margin:3px 0; background:rgba(201,154,59,0.08); border:1px dashed rgba(201,154,59,0.28); overflow:visible; }

  .el-wrap{ position:relative; border:1.5px solid transparent; border-radius:8px; transition:.1s ease; cursor:pointer; }
  .el-wrap:hover{ border-color: rgba(201,154,59,0.45); }
  .el-wrap.selected{ border-color: var(--gold-500); }
  .el-wrap .el-inner{ padding: 0; }
  .el-wrap.dragging-el{ opacity:.35; }
  .el-wrap.device-hidden .el-inner{ opacity:.32; filter:grayscale(.4); }
  .hidden-badge{
    position:absolute; top:-13px; left:50%; transform:translateX(-50%); background: var(--ink-900); color:#fff;
    font-size:9px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:3px 9px; border-radius:5px; z-index:6; white-space:nowrap;
  }
  body.preview-mode .el-wrap.device-hidden{ display:none; }
  body.preview-mode .hidden-badge{ display:none; }

  @keyframes animFadeIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes animSlideUp{ from{ opacity:0; transform:translateY(24px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes animZoomIn{ from{ opacity:0; transform:scale(.92); } to{ opacity:1; transform:scale(1); } }
  .anim-fade{ animation: animFadeIn .5s ease; }
  .anim-slide{ animation: animSlideUp .5s ease; }
  .anim-zoom{ animation: animZoomIn .4s ease; }

  .el-controls{ position:absolute; top:-13px; right:8px; display:none; align-items:center; gap:3px; background: var(--navy-900); border-radius:7px; padding:3px; box-shadow: var(--shadow-md); z-index:5; }
  .el-wrap:hover .el-controls, .el-wrap.selected .el-controls{ display:flex; }
  .el-controls button{ width:23px; height:23px; border-radius:5px; border:none; background:transparent; color: rgba(255,255,255,.75); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .el-controls button:hover{ background: rgba(255,255,255,0.14); color:#fff; }
  .el-controls button svg{ width:12px; height:12px; }
  .el-controls .drag-grip{ cursor:grab; }

  .el-label{ display:none !important; }

  .canvas-empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:560px; color: var(--ink-400); text-align:center; padding:40px; }
  .canvas-empty svg{ width:44px; height:44px; color: var(--line); margin-bottom:16px; }
  .canvas-empty h3{ font-family:'Fraunces', serif; font-size:19px; font-weight:600; color: var(--ink-600); margin-bottom:6px; }
  .canvas-empty p{ font-size:12.5px; max-width:280px; line-height:1.6; }
  .container-shell{min-height:84px;border:1.5px dashed #d9dfeb;border-radius:12px;background:rgba(248,250,252,0.92);position:relative}
  .container-shell.has-background{background:transparent;border-color:transparent}
  .container-shell.is-row{display:flex;flex-direction:row;align-items:stretch;flex-wrap:nowrap}
  .container-shell.is-column{display:flex;flex-direction:column}
  .container-shell > .container-empty{padding:18px;font-size:11.5px;color:var(--ink-400);text-align:center}
  .container-children{min-height:48px;position:relative;z-index:1}
  .container-children > .drop-zone{margin:0}
  .container-children > .el-wrap{margin:0}
  .container-shell.is-row .container-children > .drop-zone{width:0;min-width:0;height:auto;align-self:stretch}
  body.dragging-builder .container-shell.is-row .container-children > .drop-zone{width:14px;min-width:14px;height:auto;margin:0 3px}
  .container-shell.is-row .container-children > .drop-zone.active-zone{width:18px;min-width:18px;margin:0 4px}
  .container-shell.is-column .container-children > .drop-zone{width:100%}
  .container-shell.is-column .container-children > .drop-zone.active-zone{margin:4px 0}
  .container-bg-layer{position:absolute;inset:0;z-index:0;pointer-events:none;border-radius:inherit;overflow:hidden}
  .container-bg-layer.is-image,
  .container-bg-layer.is-color{background-repeat:no-repeat}
  .container-bg-video{width:100%;height:100%;object-fit:cover;display:block}

  /* preview mode: hide all editor chrome */
  body.preview-mode .side-panel{ display:none; }
  body.preview-mode .drop-zone{ display:none !important; }
  body.preview-mode .el-wrap{ border-color:transparent !important; cursor:default; }
  body.preview-mode .el-controls, body.preview-mode .el-label{ display:none !important; }
  body.preview-mode .canvas-area{ padding:40px; }
  body.preview-mode .tb-icon-btn.preview-toggle{ background: var(--gold-500); color: var(--navy-900); }

  /* ============ TOASTS ============ */
  .toast-stack{ position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:200; }
  .toast{ background: var(--navy-900); color:#fff; font-size:12.5px; font-weight:600; padding: 11px 16px; border-radius:10px; box-shadow: var(--shadow-lg); display:flex; align-items:center; gap:8px; opacity:0; transform: translateY(8px); animation: toastIn .2s ease forwards, toastOut .2s ease forwards 2.7s; }
  .toast svg{ width:14px; height:14px; color: var(--gold-500); flex-shrink:0; }
  @keyframes toastIn{ to{ opacity:1; transform: translateY(0); } }
  @keyframes toastOut{ to{ opacity:0; transform: translateY(-6px); } }


  /* ============ ENHANCED BUILDER UI ============ */
  .save-state{font-size:10.5px;color:rgba(255,255,255,.55);min-width:74px;text-align:right}
  .save-state.dirty{color:#FFD783}.save-state.saved{color:#9CE1C1}
  .tb-mini-select{height:32px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff;border-radius:7px;padding:0 8px;font-size:11px;outline:none}
  .tb-mini-select option{color:#161D2B;background:#fff}
  .widget-library{flex:1;overflow-y:auto;padding-bottom:18px}
  .widget-category{padding:12px 14px 6px;font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--gold-600);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
  .widget-category small{font-size:9px;color:var(--ink-400);letter-spacing:0;text-transform:none;font-weight:600}
  .widget-grid{overflow:visible;padding-bottom:6px}
  .widget-card{position:relative;user-select:none}
  .widget-card::after{content:'Click or drag';position:absolute;bottom:4px;font-size:8px;color:transparent;transition:.12s}
  .widget-card:hover::after{color:var(--ink-400)}
  .widget-card span{padding-bottom:5px}
  .canvas-page{transform-origin:top center}
  .canvas-page-grid{background-image:linear-gradient(rgba(11,24,48,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(11,24,48,.025) 1px,transparent 1px);background-size:20px 20px}
  .canvas-status{position:fixed;bottom:16px;left:320px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-md);border-radius:9px;padding:8px 11px;font-size:10.5px;color:var(--ink-600);z-index:18;display:flex;align-items:center;gap:10px}
  .canvas-status b{color:var(--navy-900)}
  body.preview-mode .canvas-status{left:16px}
  .upload-box{border:1.5px dashed var(--line);border-radius:10px;padding:14px;text-align:center;background:var(--line-soft);margin-bottom:12px}
  .upload-box input{display:none}.upload-box label{cursor:pointer;font-weight:700;font-size:11.5px;color:var(--navy-900)}
  .upload-box p{font-size:10px;color:var(--ink-400);margin-top:4px}
  .builder-file-stack{display:grid;gap:10px}
  .field-button{
    min-height:40px;border:1px solid var(--line);border-radius:8px;padding:0 12px;background:#fff;color:var(--navy-900);
    font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.13s ease
  }
  .field-button:hover{background:var(--gold-050);border-color:var(--gold-500)}
  .inline-editing{outline:2px dashed var(--gold-500)!important;outline-offset:4px;border-radius:3px}
  .empty-search{grid-column:1/-1;padding:28px 10px;text-align:center;color:var(--ink-400);font-size:12px}
  .kbd{font-family:'IBM Plex Mono',monospace;background:var(--line-soft);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:2px 5px;font-size:9px}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(8,17,34,.68);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
  .modal-backdrop.open{display:flex}
  .modal{width:min(760px,96vw);max-height:88vh;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden}
  .modal.small{width:min(520px,96vw)}
  .modal-header{display:flex;align-items:center;gap:12px;padding:17px 20px;border-bottom:1px solid var(--line)}
  .modal-header h2{font-family:'Fraunces',serif;font-size:20px;color:var(--navy-900);flex:1}
  .modal-close{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-size:18px;color:var(--ink-600)}
  .modal-body{padding:20px;overflow:auto}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
  .btn-light{background:#fff;border-color:var(--line);color:var(--ink-600)}
  .btn-danger{background:var(--red-100);color:var(--red-600);border-color:#f3c9c9}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .modal-grid .full{grid-column:1/-1}
  .template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .template-card{border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:.15s;background:#fff}
  .template-card:hover{border-color:var(--gold-500);transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .template-preview{height:120px;padding:12px;background:#f5f6f8;display:flex;flex-direction:column;gap:8px}
  .template-preview i{display:block;background:#d9dde5;border-radius:4px;height:10px}.template-preview i.hero{height:45px;background:#122544}.template-preview i.gold{width:35%;background:#C99A3B}.template-preview i.short{width:60%}
  .template-meta{padding:12px}.template-meta b{display:block;font-size:12.5px;margin-bottom:3px}.template-meta span{font-size:10.5px;color:var(--ink-400)}
  .code-output{width:100%;min-height:260px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.55;background:#0B1830;color:#e8edf7;border:none;border-radius:10px;padding:14px;resize:vertical}
  .shortcut-grid{display:grid;grid-template-columns:1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:11.5px}

  /* New widget presentation */
  .builder-video{position:relative;aspect-ratio:16/9;background:#0B1830;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff}
  .builder-video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .video-placeholder{display:flex;flex-direction:column;align-items:center;gap:9px;color:rgba(255,255,255,.75)}
  .gallery-grid{display:grid;gap:10px}.gallery-grid img{width:100%;height:160px;object-fit:cover;display:block}
  .accordion-item{border-bottom:1px solid var(--line)}.accordion-title{width:100%;border:none;background:transparent;padding:14px 0;display:flex;justify-content:space-between;font-weight:700;cursor:pointer;text-align:left}.accordion-content{display:none;padding:0 0 14px;color:var(--ink-600);line-height:1.6}.accordion-item.open .accordion-content{display:block}
  .tabs-head{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:14px}.tab-chip{border:none;background:transparent;padding:9px 12px;font-weight:700;color:var(--ink-400);border-bottom:2px solid transparent;cursor:pointer}.tab-chip.active{color:var(--navy-900);border-bottom-color:var(--gold-500)}
  .counter-widget{text-align:center}.counter-widget strong{font-family:'Fraunces',serif;display:block;line-height:1}.counter-widget span{display:block;margin-top:7px;color:var(--ink-600)}
  .callout-widget{display:flex;gap:14px;align-items:flex-start}.callout-icon{flex:0 0 auto;display:flex;align-items:center;justify-content:center}.callout-widget h4{font-family:'Fraunces',serif;margin-bottom:5px}.callout-widget p{line-height:1.6;color:var(--ink-600)}
  .form-widget{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-widget .full{grid-column:1/-1}.form-widget input,.form-widget textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:12px}.form-widget button{border:none;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer}
  .social-widget{display:flex;gap:8px;flex-wrap:wrap}.social-widget a{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:800}
  .progress-widget .progress-track{height:10px;background:var(--line-soft);border-radius:10px;overflow:hidden}.progress-widget .progress-fill{height:100%;border-radius:10px}.progress-meta{display:flex;justify-content:space-between;margin-bottom:7px;font-size:12px;font-weight:700}
  @media(max-width:900px){.tb-crumb span:not(.tb-page-name),.btn-exit,.save-state{display:none}.side-panel{width:270px}.canvas-status{left:288px}.template-grid{grid-template-columns:1fr}.modal-grid{grid-template-columns:1fr}.modal-grid .full{grid-column:auto}}

</style>
</head>
<body>
<div class="app">

  <!-- ============ TOP BAR ============ -->
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-mark">MW</div>
      <div class="tb-crumb">
        <b>CRM Portal</b>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        <span>Page Builder</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        <span class="tb-page-name" style="color:#fff; font-weight:700;">Untitled Page</span>
      </div>
    </div>

    <div class="tb-center">
      <button class="tb-icon-btn" id="undoBtn" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 3-7"/></svg>
      </button>
      <button class="tb-icon-btn" id="redoBtn" title="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 7v6h-6"/><path d="M21 13a9 9 0 1 1-3-7"/></svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-icon-btn active" data-device="desktop" title="Desktop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="13" rx="1.5"/><path d="M8 21h8M12 17v4"/></svg>
      </button>
      <button class="tb-icon-btn" data-device="tablet" title="Tablet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M11 18h2"/></svg>
      </button>
      <button class="tb-icon-btn" data-device="mobile" title="Mobile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-icon-btn preview-toggle" id="previewBtn" title="Preview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <select class="tb-mini-select" id="zoomSelect" title="Canvas zoom"><option value="0.75">75%</option><option value="0.9">90%</option><option value="1" selected>100%</option><option value="1.1">110%</option></select>
    </div>

    <div class="tb-right">
      <span class="save-state saved" id="saveState">Saved</span>
      <button class="tb-icon-btn" id="helpBtn" title="Keyboard shortcuts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.2 9a3 3 0 115.5 1.7c-.9.7-1.7 1.2-1.7 2.8"/><path d="M12 17h.01"/></svg></button>
      <button class="tb-icon-btn" id="templateBtn" title="Template library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></button>
      <button class="tb-icon-btn" id="pageSettingsBtn" title="Page settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.6V21h-4v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 00.3-1.9A1.7 1.7 0 003 14H3v-4h.1a1.7 1.7 0 001.6-1 1.7 1.7 0 00-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 001.9.3A1.7 1.7 0 0010 3.1V3h4v.1a1.7 1.7 0 001 1.6 1.7 1.7 0 001.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 00-.3 1.9A1.7 1.7 0 0021 10h.1v4H21a1.7 1.7 0 00-1.6 1z"/></svg></button>
      <button class="btn btn-exit" data-toast="This standalone demo keeps you inside the builder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Exit
      </button>
      <button class="btn btn-ghost-dark" id="saveDraftBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        Save Draft
      </button>
      <button class="btn btn-gold" id="publishBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        Publish
      </button>
    </div>
  </div>

  <!-- ============ WORKSPACE ============ -->
  <div class="workspace">

    <!-- LEFT PANEL -->
    <div class="side-panel">

      <!-- ELEMENTS VIEW -->
      <div class="panel-view active" id="viewElements">
        <div class="panel-topbar">
          <div class="panel-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="widgetSearch" placeholder="Search widgets…">
          </div>
          <button class="panel-mode-btn active" id="modeElementsBtn" title="Elements">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </button>
          <button class="panel-mode-btn" id="modeLayersBtn" title="Navigator">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6h11M9 12h11M9 18h11M3 6h.01M3 12h.01M3 18h.01"/></svg>
          </button>
        </div>
        <div class="widget-library" id="widgetLibrary"><div class="widget-grid" id="widgetGrid"></div></div>
      </div>

      <!-- LAYERS VIEW -->
      <div class="panel-view" id="viewLayers">
        <div class="panel-topbar">
          <div style="flex:1; font-weight:700; font-size:13px; padding-left:4px;">Navigator</div>
          <button class="panel-mode-btn" id="backToElementsBtn" title="Back to elements">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </button>
        </div>
        <div class="layers-list" id="layersList"></div>
      </div>

      <!-- SETTINGS VIEW -->
      <div class="panel-view" id="viewSettings">
        <div class="settings-header">
          <button class="settings-back" id="settingsBackBtn" title="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <div class="settings-icon" id="settingsIcon"></div>
          <div class="settings-title">
            <div class="t" id="settingsTitle">Heading</div>
            <div class="s" id="settingsSub">Editing widget</div>
          </div>
          <div class="settings-actions">
            <button class="sa-btn" id="dupBtn" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
            <button class="sa-btn danger" id="delBtn" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg></button>
          </div>
        </div>
        <div class="settings-tabs">
          <button class="settings-tab active" data-stab="content">Content</button>
          <button class="settings-tab" data-stab="style">Style</button>
          <button class="settings-tab" data-stab="advanced">Advanced</button>
        </div>
        <div class="settings-body">
          <div class="settings-panel-tab active" data-spanel="content" id="contentFields"></div>
          <div class="settings-panel-tab" data-spanel="style" id="styleFields"></div>
          <div class="settings-panel-tab" data-spanel="advanced" id="advancedFields"></div>
        </div>
      </div>

    </div>

    <!-- CANVAS -->
    <div class="canvas-area">
      <div class="canvas-page canvas-page-grid" id="canvasPage"></div>
    </div>

  </div>
</div>

<div class="canvas-status" id="canvasStatus"><b>Desktop</b><span>5 widgets</span><span>Double-click text to edit inline</span></div>
<div class="toast-stack" id="toastStack"></div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modalBox"><div class="modal-header"><h2 id="modalTitle">Dialog</h2><button class="modal-close" id="modalClose">×</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>

<script>
/* ============================================================
   ICONS
============================================================ */
const ICONS = {
  heading: '<path d="M4 6v12M12 6v12M4 12h8"/><path d="M18 8v10M18 8l3 2"/>',

  divider: '<path d="M4 12h16"/>',
  spacer: '<path d="M12 3v18M8 7l4-4 4 4M8 17l4 4 4-4"/>',
  iconbox: '<circle cx="12" cy="9" r="4"/><path d="M6 21c0-3.3 2.7-6 6-6s6 2.7 6 6"/>',

function responsiveSectionDefaults(section){

function ensureElementResponsiveState(el){
  if(!el || typeof el !== 'object') return el;
  el.responsive = el.responsive && typeof el.responsive === 'object' ? el.responsive : {};
  ['tablet','mobile'].forEach((device)=>{
    const state = el.responsive[device];
    el.responsive[device] = state && typeof state === 'object' ? state : {};
    ['style','box','advanced'].forEach((section)=>{
      const values = el.responsive[device][section];
      el.responsive[device][section] = values && typeof values === 'object' ? values : {};
    });
  });
  return el;
}
function resolveResponsiveSection(el, section, device=currentDevice){
  ensureElementResponsiveState(el);
  const base = { ...responsiveSectionDefaults(section), ...(el?.[section] || {}) };
  if(device === 'desktop') return base;
  const tablet = { ...base, ...(el.responsive?.tablet?.[section] || {}) };
  if(device === 'tablet') return tablet;
  return { ...tablet, ...(el.responsive?.mobile?.[section] || {}) };
}
function responsiveEditTarget(el, section, device=currentDevice){
  ensureElementResponsiveState(el);
  if(device === 'desktop'){
    el[section] = { ...responsiveSectionDefaults(section), ...(el[section] || {}) };
    return el[section];
  }
  return el.responsive[device][section];
}
function responsiveSectionProxy(el, section, device=currentDevice){
  const target = responsiveEditTarget(el, section, device);
  return new Proxy(target, {
    get(object, property){
      if(section === 'advanced' && GLOBAL_ADVANCED_KEYS.has(property)){
        return el.advanced?.[property];
      }
      if(Object.prototype.hasOwnProperty.call(object, property)) return object[property];
      return resolveResponsiveSection(el, section, device)[property];
    },
    set(object, property, value){
      if(section === 'advanced' && GLOBAL_ADVANCED_KEYS.has(property)){
        el.advanced = { ...defaultAdvanced(), ...(el.advanced || {}), [property]: value };
      }else{
        object[property] = value;
      }
      return true;
    }
  });
}
function resolveElementForDevice(el, device=currentDevice){

  if(historyIndex <= 0) return;
  historyIndex--;
  elements = ensureTreeDefaults(JSON.parse(history[historyIndex]));
  selectedId = null;
  renderAll();
  updateHistoryButtons();
  showToast('Undid last change');
}

  if(historyIndex >= history.length-1) return;
  historyIndex++;
  elements = ensureTreeDefaults(JSON.parse(history[historyIndex]));
  selectedId = null;
  renderAll();
  updateHistoryButtons();
  showToast('Redid change');
}
function updateHistoryButtons(){
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= history.length-1;
}

function normalizeImportedAssetUrl(value=''){
  const raw = String(value || '').trim();
  if(!raw || /^(data:|blob:|mailto:|tel:|#|javascript:)/i.test(raw)) return raw;
  if(raw.startsWith(`${hostLiveAssetProxyPrefix}/assets/`)) return raw;
  if(raw === hostLiveAssetProxyPrefix || raw.startsWith(`${hostLiveAssetProxyPrefix}/`)) return raw;
  if(/^\/assets\//i.test(raw)) return `${hostLiveAssetProxyPrefix}${raw}`;
  if(/^assets\//i.test(raw)) return `${hostLiveAssetProxyPrefix}/${raw}`;
  try{
    const absolute = /^https?:\/\//i.test(raw)
      ? new URL(raw)
      : new URL(raw.startsWith('/') ? raw : `/${raw.replace(/^\.?\//,'')}`, hostLiveSiteOrigin || window.location.origin);
    if(absolute.pathname.startsWith('/assets/')) return `${hostLiveAssetProxyPrefix}${absolute.pathname}${absolute.search}${absolute.hash}`;
    if(hostLiveSiteOrigin && absolute.origin === new URL(hostLiveSiteOrigin).origin){
      return `${hostLiveAssetProxyPrefix}${absolute.pathname}${absolute.search}${absolute.hash}`;
    }
    return absolute.toString();
  }catch{
    return raw;
  }
}
function normalizeImportedSrcset(value=''){

      const parts = candidate.trim().split(/\s+/);
      if(!parts[0]) return '';
      parts[0] = normalizeImportedAssetUrl(parts[0]);
      return parts.join(' ');
    })
    .filter(Boolean)
    .join(', ');
}

function hydrateImportedAssets(root){
  if(!root) return;
  ensureImportedEditorFonts();
  root.querySelectorAll('img').forEach((img)=>{
    const dataSrc = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('data-original') || img.getAttribute('data-lazy') || '';
    const dataSrcset = img.getAttribute('data-srcset') || img.getAttribute('data-lazy-srcset') || '';
    const currentSrc = img.getAttribute('src') || '';
    if(dataSrc && (!currentSrc || currentSrc === '#' || /placeholder/i.test(currentSrc))) img.setAttribute('src', dataSrc);
    if(dataSrcset && !img.getAttribute('srcset')) img.setAttribute('srcset', dataSrcset);
    const normalizedSrc = normalizeImportedAssetUrl(img.getAttribute('src') || '');
    if(normalizedSrc) img.setAttribute('src', normalizedSrc);
    const normalizedSrcset = normalizeImportedSrcset(img.getAttribute('srcset') || '');
    if(normalizedSrcset) img.setAttribute('srcset', normalizedSrcset);
    img.setAttribute('loading','eager');
    img.setAttribute('decoding','async');
    img.onerror = ()=> {
      const fallback = normalizeImportedAssetUrl(dataSrc || currentSrc);
      if(fallback && img.getAttribute('src') !== fallback) img.setAttribute('src', fallback);
    };
  });
  root.querySelectorAll('source').forEach((source)=>{
    const dataSrcset = source.getAttribute('data-srcset') || source.getAttribute('data-lazy-srcset') || '';
    const currentSrcset = source.getAttribute('srcset') || dataSrcset;
    if(currentSrcset) source.setAttribute('srcset', normalizeImportedSrcset(currentSrcset));
  });

    node.setAttribute('data-import-hoverable','true');
    if(isImportedOverlayLikeNode(node) || isImportedDecorativeImageNode(node)){
      node.setAttribute('data-import-overlay-skip','true');
      node.removeAttribute('data-import-hoverable');
    }else{
      node.removeAttribute('data-import-overlay-skip');
    }
    const bg = importedBackgroundSource(node);
    if(bg){
      node.style.backgroundImage = `url("${normalizeImportedAssetUrl(bg)}")`;
      if(!node.style.backgroundSize) node.style.backgroundSize = 'cover';
      if(!node.style.backgroundPosition) node.style.backgroundPosition = 'center center';
      if(!node.style.backgroundRepeat) node.style.backgroundRepeat = 'no-repeat';
    }
    const mask = node.getAttribute('data-mask-src');
    if(mask){
      const normalizedMask = normalizeImportedAssetUrl(mask);
      node.style.maskImage = `url("${normalizedMask}")`;
      node.style.webkitMaskImage = `url("${normalizedMask}")`;
    }
  });
}

function selectImportedNode(node){
  const target = getImportedSelectableNode(node);
  if(!target) return;
  clearImportedSelection();

  document.querySelectorAll('.el-wrap.selected').forEach(w=>w.classList.remove('selected'));

  renderImportedSettings(target);
}

  root.setAttribute('data-import-initialized','true');
  try{
    hydrateImportedAssets(root);
    applyImportedResponsiveDeviceStyles(root, currentDevice);
  }catch(error){
    reportImportedEditorError('asset-hydration-failed', { error });
  }
  root.addEventListener('click', (event)=>{
    const rawTarget = resolveImportedPointerTarget(event);
    const iconTarget = getImportedIconTarget(event.target);
    const textTarget = iconTarget ? null : getImportedInlineTextTarget(event.target);
    const mediaTarget = textTarget || iconTarget ? null : getImportedEditableMediaTarget(rawTarget);
    const target = iconTarget || textTarget || mediaTarget || getImportedContentNode(rawTarget);
    if(!target) return;
    event.preventDefault();
    event.stopPropagation();
    selectImportedNode(event.shiftKey && target.parentElement && target.parentElement!==root ? target.parentElement : target);
  }, true);
  root.addEventListener('dblclick', (event)=>{
    const directTarget = resolveImportedPointerTarget(event);
    if(!directTarget) return;
    const iconTarget = getImportedIconTarget(event.target);
    const textTarget = iconTarget ? null : getImportedInlineTextTarget(event.target);
    const mediaTarget = textTarget || iconTarget ? null : getImportedEditableMediaTarget(directTarget);
    if(mediaTarget){
      event.preventDefault();
      event.stopPropagation();
      selectImportedNode(mediaTarget);
      window.setTimeout(()=>{
        const mediaButton = document.getElementById('importedImageLibraryBtn');
        if(mediaButton) mediaButton.click();
      }, 0);
      return;
    }
    if(iconTarget){
      event.preventDefault();
      event.stopPropagation();
      selectImportedNode(iconTarget);
      return;
    }
    const target = textTarget || getImportedContentNode(directTarget);
    if(!target || !String(target.textContent || '').trim()) return;
    event.preventDefault();
    event.stopPropagation();
    selectImportedNode(target);
    target.contentEditable = 'true';
    target.focus();
    const finish = ()=>{
      target.contentEditable = 'false';
      syncImportedHtmlToModel('imported-inline-text', true);
      renderImportedSettings(target);
      target.removeEventListener('blur', finish);
    };
    target.addEventListener('blur', finish);
  }, true);
  root.addEventListener('dragover', (event)=>{
    if(!dragPayload || dragPayload.kind!=='new') return;
    event.preventDefault();
    event.stopPropagation();
    if(event.dataTransfer) event.dataTransfer.dropEffect = 'copy';
    const target = getImportedDropTargetFromEvent(event);
    showImportedDropTarget(resolveImportedInsertLocation(target, event));
  }, true);
  root.addEventListener('dragleave', (event)=>{
    if(root.contains(event.relatedTarget)) return;
    clearImportedDropTarget();
  }, true);
  root.addEventListener('drop', (event)=>{
    if(!dragPayload || dragPayload.kind!=='new') return;
    event.preventDefault();
    event.stopPropagation();
    clearImportedDropTarget();
    const target = getImportedDropTargetFromEvent(event);
    insertImportedWidget(dragPayload.widgetType, target, event);
    dragPayload = null;
    setDraggingBuilderState(false);
  }, true);
}

function composeWrapStyle(el){
  const a = el.advanced || {};
  const b = { ...defaultBox(), ...(el.box || {}) };
  const mt = a.marginTop ?? 0, mr = a.marginRight ?? 0, mb = a.marginBottom ?? 0, ml = a.marginLeft ?? 0;
  const pt = a.paddingTop ?? 0, pb = a.paddingBottom ?? 0, pl = a.paddingLeft ?? 0, pr = a.paddingRight ?? 0;
  let style = `padding:${pt}px ${pr}px ${pb}px ${pl}px; margin:${mt}px ${mr}px ${mb}px ${ml}px;`;
  if(el.type !== 'container'){
    style += `background-color:${b.bg||'transparent'};`;
    if(b.bgImage) style += `background-image:url('${safeUrl(b.bgImage)}'); background-size:${b.bgSize||'cover'}; background-position:${resolveBoxBackgroundPosition(b)}; background-repeat:no-repeat;`;
  } else {
    style += `position:relative; overflow:hidden;`;
  }
  const btw = Number(b.borderTopWidth ?? b.borderWidth ?? 0);
  const brw = Number(b.borderRightWidth ?? b.borderWidth ?? 0);
  const bbw = Number(b.borderBottomWidth ?? b.borderWidth ?? 0);
  const blw = Number(b.borderLeftWidth ?? b.borderWidth ?? 0);
  if(btw || brw || bbw || blw) style += `border-style:${b.borderStyle||'solid'};border-color:${b.borderColor};border-width:${btw}px ${brw}px ${bbw}px ${blw}px;`;
  const tlr = Number(b.borderTopLeftRadius ?? b.borderRadius ?? 0);
  const trr = Number(b.borderTopRightRadius ?? b.borderRadius ?? 0);
  const brr = Number(b.borderBottomRightRadius ?? b.borderRadius ?? 0);
  const blr = Number(b.borderBottomLeftRadius ?? b.borderRadius ?? 0);
  if(tlr || trr || brr || blr) style += `border-radius:${tlr}px ${trr}px ${brr}px ${blr}px;`;
  if(b.shadow) {
    const shadowColor = b.shadowColor || 'rgba(15,23,42,0.16)';
    const blur = Number(b.shadowBlur || 18);
    const spread = Number(b.shadowSpread || 0);
    const top = Number(b.shadowTop || 0);
    const right = Number(b.shadowRight || 0);
    const bottom = Number(b.shadowBottom || 0);
    const left = Number(b.shadowLeft || 0);
    const parts = [];
    if(top) parts.push(`0 ${-top}px ${blur}px ${spread}px ${shadowColor}`);
    if(right) parts.push(`${right}px 0 ${blur}px ${spread}px ${shadowColor}`);
    if(bottom) parts.push(`0 ${bottom}px ${blur}px ${spread}px ${shadowColor}`);
    if(left) parts.push(`${-left}px 0 ${blur}px ${spread}px ${shadowColor}`);
    if(!parts.length) parts.push(`0 10px 30px 0 ${shadowColor}`);
    style += `box-shadow:${parts.join(',')};`;
  }
  const flexGrow = Number(b.flexGrow || 0);
  const hasExplicitWidth = Number(b.width || 0) > 0;
  if(hasExplicitWidth) style += `width:${b.width}${(b.widthUnit||'px') === 'wh' ? '%' : (b.widthUnit||'px')};`;
  if((b.height||0) > 0) style += `height:${b.height}${b.heightUnit||'px'};`;
  if((b.minHeight||0) > 0) style += `min-height:${b.minHeight}${b.minHeightUnit||'px'};`;
  if(flexGrow > 0) style += `display:block; flex:${flexGrow} 1 0; width:auto; min-width:0; max-width:100%;`;
  else if(hasExplicitWidth) style += `${b.displayMode==='inline'?'display:inline-block;':'display:block;'} max-width:100%;`;
  else if(b.displayMode==='inline') style += `display:inline-block; max-width:100%;`;
  else if(b.displayMode==='fullwidth') style += `display:block; width:100%;`;
  else style += `display:block; width:fit-content; max-width:100%;`;
  const opacity = a.opacity!=null ? a.opacity : 100;
  style += `opacity:${opacity/100};`;
  if(a.zIndex) style += `position:relative; z-index:${a.zIndex};`;
  if(el.style && el.style.verticalAlign){
    const map={top:'flex-start',middle:'center',bottom:'flex-end'};
    style += `display:flex; flex-direction:column; justify-content:${map[el.style.verticalAlign]||'flex-start'};`;
  }
  return style;
}
function importedNodeCanAcceptChildren(node){
  if(!node || node.nodeType!==1) return false;
  const tag = String(node.tagName || '').toLowerCase();
  return ['section','article','div','main','aside','header','footer','nav','figure','figcaption','ul','ol','li','form'].includes(tag);
}
function clearImportedDropTarget(){
  const root = getImportedHtmlRoot();
  if(!root) return;
  root.querySelectorAll('[data-import-drop-target="true"]').forEach((node)=>node.removeAttribute('data-import-drop-target'));
}
function showImportedDropTarget(location){
  clearImportedDropTarget();
  const target = location?.parent;
  if(target && target.nodeType===1) target.setAttribute('data-import-drop-target','true');
}
function resolveImportedChildInsertion(parent, event){
  if(!parent || !event || !Number.isFinite(event.clientX) || !Number.isFinite(event.clientY)) return null;
  const children = Array.from(parent.children || []).filter((node)=>
    !['script','style','link','meta'].includes(String(node.tagName || '').toLowerCase()) &&
    node.getAttribute?.('data-import-overlay-skip') !== 'true'
  );
  if(!children.length) return null;
  let direction = 'column';
  try{
    const computed = window.getComputedStyle(parent);
    if(computed.display.includes('flex')) direction = computed.flexDirection.startsWith('row') ? 'row' : 'column';
    else if(computed.display.includes('grid') && children.length > 1) direction = 'grid';
  }catch{}
  if(direction==='row'){
    const before = children.find((child)=>{
      const rect = child.getBoundingClientRect();
      return event.clientX < rect.left + (rect.width / 2);
    });
    return { parent, before: before || null, mode: before ? 'inside-before-child' : 'inside-after-children' };
  }
  const before = children.find((child)=>{
    const rect = child.getBoundingClientRect();
    return event.clientY < rect.top + (rect.height / 2);
  });
  return { parent, before: before || null, mode: before ? 'inside-before-child' : 'inside-after-children' };
}
function getImportedDropTargetFromEvent(event){
  if(!event) return importedSelectionNode || getImportedHtmlRoot();
  const pointerTarget = resolveImportedPointerTarget(event);
  if(pointerTarget) return pointerTarget;
  const root = getImportedHtmlRoot();
  if(typeof document.elementsFromPoint === 'function'){
    const stack = document.elementsFromPoint(event.clientX, event.clientY);
    const target = stack.find((node)=> root && root.contains(node) && getImportedSelectableNode(node));
    if(target) return getImportedSelectableNode(target);
  }
  return importedSelectionNode || root;
}
function resolveImportedInsertLocation(target, event){
  const root = getImportedHtmlRoot();
  if(!root) return null;
  const selectedTarget = getImportedSelectableNode(target || importedSelectionNode || root) || root;
  if(selectedTarget === root) return resolveImportedChildInsertion(root, event) || { parent: root, before: null, mode: 'root' };

  let rect = null;
  try{ rect = selectedTarget.getBoundingClientRect(); }catch{}
  const hasPointer = event && rect && Number.isFinite(event.clientY) && rect.height > 0;
  const verticalRatio = hasPointer ? (event.clientY - rect.top) / rect.height : 0.5;
  const edgeDrop = hasPointer && (verticalRatio < 0.22 || verticalRatio > 0.78);

  if(importedNodeCanAcceptChildren(selectedTarget) && !edgeDrop){
    return resolveImportedChildInsertion(selectedTarget, event) || { parent: selectedTarget, before: null, mode: 'inside' };
  }
  if(selectedTarget.parentElement && root.contains(selectedTarget.parentElement)){
    const before = hasPointer && verticalRatio < 0.5 ? selectedTarget : selectedTarget.nextSibling;
    return { parent: selectedTarget.parentElement, before, mode: before === selectedTarget ? 'before' : 'after' };
  }
  return { parent: root, before: null, mode: 'root-fallback' };
}
function buildImportedWidgetTemplate(widgetType){
  const baseElement = widgetType === 'columns'
    ? createColumnsElement()
    : Object.assign({ id: uid(), type: widgetType, advanced:{} }, defaultsFor(widgetType));
  const element = ensureTreeDefaults([baseElement])[0];
  return `<div class="mwu-imported-widget-node" data-import-hoverable="true" style="${composeWrapStyle(element)}">${elementInnerHTML(element)}</div>`;
}
function createImportedWidgetNode(widgetType){
  const template = document.createElement('template');
  template.innerHTML = buildImportedWidgetTemplate(widgetType).trim();
  return template.content.firstElementChild;
}
function insertImportedWidget(widgetType, target, event){
  if(!isImportedExactPageMode()) return false;
  const insertLocation = resolveImportedInsertLocation(target, event);
  if(!insertLocation?.parent) return false;
  const nextNode = createImportedWidgetNode(widgetType);
  if(!nextNode) return false;
  insertLocation.parent.insertBefore(nextNode, insertLocation.before || null);
  hydrateImportedAssets(nextNode);
  syncImportedHtmlToModel('imported-widget-insert', true);
  selectImportedNode(nextNode);
  console.info('[MWU imported editor] widget inserted', { widgetType, mode: insertLocation.mode, parent: describeImportedDebugTarget(insertLocation.parent), before: describeImportedDebugTarget(insertLocation.before) });

function isHiddenForDevice(el, device){
  const a = el.advanced || {};
  if(device==='desktop') return !!a.hideDesktop;
  if(device==='tablet') return !!a.hideTablet;
  if(device==='mobile') return !!a.hideMobile;
  return false;
}
function animationClass(el){
  const anim = (el.advanced||{}).animation;
  if(!anim || anim==='none') return '';
  return 'anim-' + anim;

const canvasPage = document.getElementById('canvasPage');

function mountImportedExactHtml(scope=canvasPage){
  if(!isImportedExactPageMode() || !scope) return;
  const mount = scope.matches?.('[data-import-html-mount="true"]')
    ? scope
    : scope.querySelector?.('[data-import-html-mount="true"]');

function renderCanvas(){
  if(elements.length === 0){
    canvasPage.innerHTML = `<div class="canvas-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <h3>This page is empty</h3>
      <p>Drag a widget from the left panel and drop it here to start building.</p>
    </div>` + dropZoneHTML(0);
    wireDropZones();
    return;
  }

  let html = dropZoneHTML(0);
  elements.forEach((el, idx)=>{
    const w = WIDGETS.find(w=>w.type===el.type) || {label:el.type, icon:'heading'};
    const hidden = isHiddenForDevice(el, currentDevice);
    const cssClasses = (el.advanced && el.advanced.cssClasses) ? ' ' + el.advanced.cssClasses.trim() : '';
    html += `
      <div class="el-wrap ${selectedId===el.id?'selected':''} ${hidden?'device-hidden':''}" data-id="${el.id}" draggable="true">
        ${hidden ? `<div class="hidden-badge">Hidden on ${currentDevice}</div>` : ''}
        <div class="el-controls">
          <button class="drag-grip" title="Drag">${svgIcon('drag',12)}</button>
          <button class="dup-el" title="Duplicate" data-id="${el.id}">${svgIcon('dup',12)}</button>
          <button class="del-el" title="Delete" data-id="${el.id}">${svgIcon('del',12)}</button>
        </div>
        <div class="el-inner ${el.id} ${animationClass(el)}${cssClasses}" style="${composeWrapStyle(el)}">${elementInnerHTML(el)}</div>
      </div>
      ${dropZoneHTML(idx+1)}

  });
  canvasPage.innerHTML = html;
  mountImportedExactHtml(canvasPage);
  wireCanvasEvents();
  wireDropZones();

function dropZoneHTML(index){
  return `<div class="drop-zone" data-index="${index}"></div>`;
}

function wireCanvasEvents(){
  canvasPage.querySelectorAll('.el-wrap').forEach(wrap=>{
    const id = wrap.dataset.id;
    wrap.addEventListener('click', (e)=>{
      e.stopPropagation();
      selectElement(id);
    });
    wrap.addEventListener('dragstart', (e)=>{
      dragPayload = { kind:'move', id };
      wrap.classList.add('dragging-el');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    });
    wrap.addEventListener('dragend', ()=>{
      wrap.classList.remove('dragging-el');
      dragPayload = null;
    });
    wrap.querySelector('.dup-el').addEventListener('click', (e)=>{
      e.stopPropagation();
      duplicateElement(id);
    });
    wrap.querySelector('.del-el').addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteElement(id);
    });
  });
}

function wireDropZones(){
  canvasPage.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.addEventListener('dragover', (e)=>{
      e.preventDefault();
      zone.classList.add('active-zone');
    });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('active-zone'));
    zone.addEventListener('drop', (e)=>{
      e.preventDefault();
      zone.classList.remove('active-zone');
      const targetIndex = parseInt(zone.dataset.index);
      if(!dragPayload) return;

      if(dragPayload.kind === 'new'){
        const def = defaultsFor(dragPayload.widgetType);
        const newEl = Object.assign({ id: uid(), type: dragPayload.widgetType, advanced:{} }, def);
        elements.splice(targetIndex, 0, newEl);
        selectedId = newEl.id;
        pushHistory();
        renderAll();
        openSettingsFor(newEl.id);
      } else if(dragPayload.kind === 'move'){
        const fromIndex = elements.findIndex(el => el.id === dragPayload.id);
        if(fromIndex === -1) return;
        const [moved] = elements.splice(fromIndex, 1);
        const adjIndex = fromIndex < targetIndex ? targetIndex - 1 : targetIndex;
        elements.splice(adjIndex, 0, moved);
        pushHistory();
        renderAll();
      }
      dragPayload = null;
    });
  });
}

function deselectAll(){
  const hadImportedSelection = !!importedSelectionNode;

    if(hadImportedSelection) switchLeftView('elements');

  selectedId = null;

  switchLeftView('elements');
}

/* ============================================================
   ELEMENT ACTIONS
============================================================ */
function duplicateElement(id){
  const idx = elements.findIndex(el=>el.id===id);
  if(idx===-1) return;
  const copy = JSON.parse(JSON.stringify(elements[idx]));
  copy.id = uid();
  elements.splice(idx+1, 0, copy);
  pushHistory();
  selectedId = copy.id;
  renderAll();
  openSettingsFor(copy.id);
  showToast('Widget duplicated');
}
function deleteElement(id){
  const idx = elements.findIndex(el=>el.id===id);
  if(idx===-1) return;
  elements.splice(idx,1);
  if(selectedId===id) selectedId=null;
  pushHistory();
  renderAll();
  if(selectedId===null) switchLeftView('elements');
  showToast('Widget deleted');
}
function selectElement(id){
  selectedId = id;
  document.querySelectorAll('.el-wrap').forEach(w=> w.classList.toggle('selected', w.dataset.id===id));
  openSettingsFor(id);
}

/* ============================================================
   LEFT PANEL VIEW SWITCHING
============================================================ */
function switchLeftView(view){
  document.querySelectorAll('.panel-view').forEach(v=>v.classList.remove('active'));
  if(view==='elements') document.getElementById('viewElements').classList.add('active');
  if(view==='layers') document.getElementById('viewLayers').classList.add('active');
  if(view==='settings') document.getElementById('viewSettings').classList.add('active');
  document.getElementById('modeElementsBtn').classList.toggle('active', view==='elements');
  document.getElementById('modeLayersBtn').classList.toggle('active', view==='layers');
}
document.getElementById('modeElementsBtn').addEventListener('click', ()=> switchLeftView('elements'));
document.getElementById('modeLayersBtn').addEventListener('click', ()=>{ renderLayers(); switchLeftView('layers'); });
document.getElementById('backToElementsBtn').addEventListener('click', ()=> switchLeftView('elements'));
document.getElementById('settingsBackBtn').addEventListener('click', ()=>{ deselectAll(); switchLeftView('elements'); });

/* ============================================================
   LAYERS / NAVIGATOR
============================================================ */
function renderLayers(){
  const list = document.getElementById('layersList');
  if(elements.length===0){
    list.innerHTML = `<div class="layers-empty">${svgIcon('columns',28)}<div>No widgets on this page yet. Add one from the Elements panel.</div></div>`;
    return;
  }
  list.innerHTML = '';
  elements.forEach(el=>{
    const w = WIDGETS.find(w=>w.type===el.type) || {label:el.type, icon:'heading'};
    const row = document.createElement('div');
    row.className = 'layer-row' + (selectedId===el.id ? ' selected' : '');
    row.innerHTML = `<div class="li-icon">${svgIcon(w.icon,12)}</div><div class="li-label">${w.label}</div><button class="li-del" data-id="${el.id}">${svgIcon('del',12)}</button>`;
    row.addEventListener('click', (e)=>{
      if(e.target.closest('.li-del')) return;
      selectElement(el.id);
      switchLeftView('settings');
    });
    row.querySelector('.li-del').addEventListener('click', (e)=>{ e.stopPropagation(); deleteElement(el.id); renderLayers(); });
    list.appendChild(row);
  });
}

/* ============================================================
   SETTINGS PANEL
============================================================ */
function openSettingsFor(id){
  const el = elements.find(e=>e.id===id);
  if(!el) return;
  const w = WIDGETS.find(w=>w.type===el.type) || {label:el.type, icon:'heading'};
  document.getElementById('settingsIcon').innerHTML = svgIcon(w.icon,15);
  document.getElementById('settingsTitle').textContent = w.label;
  document.getElementById('settingsSub').textContent = 'Editing widget';
  renderContentFields(el);
  renderStyleFields(el);
  renderAdvancedFields(el);
  switchLeftView('settings');
  // default to content tab
  document.querySelectorAll('.settings-tab').forEach(t=>t.classList.toggle('active', t.dataset.stab==='content'));
  document.querySelectorAll('.settings-panel-tab').forEach(p=>p.classList.toggle('active', p.dataset.spanel==='content'));
}

document.querySelectorAll('.settings-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.settings-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.stab;
    document.querySelectorAll('.settings-panel-tab').forEach(p=>p.classList.toggle('active', p.dataset.spanel===target));

});

document.getElementById('dupBtn').addEventListener('click', ()=>{

});

function reRenderElement(el){
  const wrap = canvasPage.querySelector(`.el-wrap[data-id="${el.id}"]`);
  if(wrap){
    const inner = wrap.querySelector('.el-inner');
    inner.innerHTML = elementInnerHTML(el);
    mountImportedExactHtml(inner);
    inner.setAttribute('style', composeWrapStyle(el));
    const cssClasses = (el.advanced && el.advanced.cssClasses) ? ' ' + el.advanced.cssClasses.trim() : '';
    inner.className = `el-inner ${el.id} ${animationClass(el)}${cssClasses}`;
  }
}
function rebuildCustomStyles(){
  let existing = document.getElementById('customElementStyles');
  if(!existing){
    existing = document.createElement('style');
    existing.id = 'customElementStyles';
    document.head.appendChild(existing);
  }
  const rules = elements
    .filter(el => el.advanced && el.advanced.customCss && el.advanced.customCss.trim())
    .map(el => `.${el.id} { ${el.advanced.customCss} }`)
    .join('\n');
  existing.textContent = rules;
}
function replayAnimation(id){
  const inner = canvasPage.querySelector(`.el-inner.${id}`);
  if(!inner) return;
  inner.style.animation = 'none';
  void inner.offsetWidth;
  const el = elements.find(e=>e.id===id);
  inner.className = `el-inner ${id} ${animationClass(el)}`;
}

    case 'text':
      html += fieldTextarea('Text content', 'textContent', c.text);

      html += `<div class="field-group"><div class="field-group-label">Choose image</div>

      html += fieldInput('Button text', 'btnText', c.text);
      html += fieldInput('Link URL', 'btnLink', c.link);

function bindContentEvents(el){
  const c = el.content;
  const bind = (id, cb, evt='input') => { const node = document.getElementById('f_'+id); if(node) node.addEventListener(evt, ()=> cb(node.value)); };

  bind('headingText', v=>{ c.text=v; reRenderElement(el); });
  bind('headingTag', v=>{ c.tag=v; reRenderElement(el); }, 'change');
  bind('textContent', v=>{ c.text=v; reRenderElement(el); });
  bind('imageSrc', v=>{ c.src=v; reRenderElement(el); renderContentFields(el); });
  bind('imageAlt', v=>{ c.alt=v; reRenderElement(el); });
  bind('btnText', v=>{ c.text=v; reRenderElement(el); });
  bind('btnLink', v=>{ c.link=v; reRenderElement(el); });
  bind('iconType', v=>{ c.icon=v; reRenderElement(el); }, 'change');
  bind('iconTitle', v=>{ c.title=v; reRenderElement(el); });
  bind('iconText', v=>{ c.text=v; reRenderElement(el); });
  bind('listItems', v=>{ c.items=v; reRenderElement(el); });
  bind('testiQuote', v=>{ c.quote=v; reRenderElement(el); });
  bind('testiName', v=>{ c.name=v; reRenderElement(el); });
  bind('testiRole', v=>{ c.role=v; reRenderElement(el); });

  document.querySelectorAll('.preset-swatch').forEach(sw=>{
    sw.addEventListener('click', ()=>{
      c.src = sw.dataset.src;
      reRenderElement(el);
      renderContentFields(el);
    });

  box_listenBlur('contentFields');
}

function wireStepperControl(inputId, onChange){
  const input=document.getElementById(inputId);
  if(!input) return;
  const apply=()=>onChange(Number(input.value)||0);
  input.addEventListener('input', apply);
  input.addEventListener('change', ()=>{ apply(); pushHistory(); });
  document.querySelectorAll(`[data-step-target="${inputId}"]`).forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const step=Number(input.step||1) || 1;
      const delta=Number(btn.dataset.stepDelta||0) * step;
      const min=input.min!==''?Number(input.min):-Infinity;
      const max=input.max!==''?Number(input.max):Infinity;
      const next=Math.max(min, Math.min(max, (Number(input.value)||0) + delta));
      input.value = String(next);
      apply();
      pushHistory();
    });
  });
}
function syncUnitValueSelect(select, value){
  if(!select) return;

  if(numeric && String(numeric.value) !== String(value)) numeric.value = value;
}

  const slider = document.getElementById(`f_${id}`);
  const numeric = document.getElementById(`n_${id}`);
  if(slider && String(slider.value) !== String(value)) slider.value = value;
  if(numeric && String(numeric.value) !== String(value)) numeric.value = value;
}

function bindStyleEvents(el){
  const s = responsiveSectionProxy(el, 'style');
  // ranges
  ['fontSize','lineHeight','radius','thickness','gap','height','letterSpacing','iconSize','borderWidth','iconRadius','iconBorderWidth','titleSize','textSize'].forEach(key=>{
    const node = document.getElementById('f_'+key);
    if(!node) return;
    node.addEventListener('input', ()=>{
      const v = parseFloat(node.value);
      s[key] = v;
      const unitLabel = key==='lineHeight' ? '' : (key==='width' ? '%' : 'px');
      const vnode = document.getElementById('v_'+key);
      if(vnode) vnode.textContent = v + unitLabel;
      reRenderElement(el);
    });
    node.addEventListener('change', ()=> pushHistory());
  });

  // colors
  ['color','bg','iconColor','iconBg','accent','markerColor','borderColor','iconBorderColor','titleColor','textColor'].forEach(key=>{
    const cnode = document.getElementById('f_'+key);
    const tnode = document.getElementById('t_'+key);
    if(!cnode) return;
    cnode.addEventListener('input', ()=>{ s[key]=cnode.value; tnode.value=cnode.value; reRenderElement(el); });
    cnode.addEventListener('change', ()=> pushHistory());
    tnode.addEventListener('input', ()=>{ s[key]=tnode.value; cnode.value = /^#[0-9A-Fa-f]{6}$/.test(tnode.value) ? tnode.value : cnode.value; reRenderElement(el); });
    tnode.addEventListener('blur', ()=> pushHistory());
  });

  // selects
  ['fontWeight','size','transform','lineStyle','fit'].forEach(key=>{
    const node = document.getElementById('f_'+key);
    if(!node) return;
    node.addEventListener('change', ()=>{ s[key]=node.value; reRenderElement(el); pushHistory(); });
  });

  const widthSlider = document.getElementById('f_width');
  const widthNumber = document.getElementById('n_width');
  const widthUnit = document.getElementById('f_widthUnit');
  if(widthUnit) syncUnitValueSelect(widthUnit, s.width||0);
  const applyImageWidth = (value)=>{
    s.width = Number(value)||0;
    syncMetricControlPair('width', s.width);
    syncUnitValueSelect(widthUnit, s.width);
    reRenderElement(el);
  };
  if(widthSlider){
    widthSlider.addEventListener('input', ()=> applyImageWidth(widthSlider.value));
    widthSlider.addEventListener('change', ()=> pushHistory());
  }
  if(widthNumber){
    widthNumber.addEventListener('input', ()=> applyImageWidth(widthNumber.value));
    widthNumber.addEventListener('change', ()=> pushHistory());
  }
  if(widthUnit){
    widthUnit.addEventListener('change', ()=>{
      s.widthUnit = widthUnit.value;
      syncUnitValueSelect(widthUnit, s.width||0);
      reRenderElement(el);
      pushHistory();
    });
  }
  const imageHeight = document.getElementById('f_imageHeight');
  const imageHeightNumber = document.getElementById('n_imageHeight');
  const imageHeightUnit = document.getElementById('f_imageHeightUnit');
  if(imageHeightUnit) syncUnitValueSelect(imageHeightUnit, s.height||0);
  const applyImageHeight = (value)=>{
    s.height = Number(value)||0;
    syncMetricControlPair('imageHeight', s.height);
    syncUnitValueSelect(imageHeightUnit, s.height);
    reRenderElement(el);
  };
  if(imageHeight){
    imageHeight.addEventListener('input', ()=> applyImageHeight(imageHeight.value));
    imageHeight.addEventListener('change', ()=> pushHistory());
  }
  if(imageHeightNumber){
    imageHeightNumber.addEventListener('input', ()=> applyImageHeight(imageHeightNumber.value));
    imageHeightNumber.addEventListener('change', ()=> pushHistory());
  }
  if(imageHeightUnit){
    imageHeightUnit.addEventListener('change', ()=>{
      s.heightUnit = imageHeightUnit.value;
      syncUnitValueSelect(imageHeightUnit, s.height||0);
      reRenderElement(el);
      pushHistory();
    });
  }

  // align button group
  const alignGroupH = document.getElementById('f_align_h');
  if(alignGroupH){
    alignGroupH.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        alignGroupH.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        s.align = btn.dataset.v;
        reRenderElement(el);
        pushHistory();
      });
    });

  const alignGroupV = document.getElementById('f_align_v');

    alignGroupV.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{

        reRenderElement(el);
        pushHistory();
      });
    });
