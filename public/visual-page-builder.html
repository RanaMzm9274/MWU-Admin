<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Madda Walabu University — CRM Portal · Visual Page Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-900:#0B1830; --navy-800:#122544; --navy-700:#1B3059;
    --gold-600:#B9862E; --gold-500:#C99A3B; --gold-100:#F6EDDB; --gold-050:#FBF6EB;
    --bg:#EEF0F3; --panel:#FFFFFF; --line:#E4E7ED; --line-soft:#EDEFF3;
    --ink-900:#161D2B; --ink-600:#4B5468; --ink-400:#8A93A6;
    --green-600:#1F8A5F; --green-100:#E4F5EC; --red-600:#C23B3B; --red-100:#FBE8E8;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.05);
    --shadow-md: 0 6px 20px rgba(15,23,42,0.09);
    --shadow-lg: 0 20px 50px rgba(11,24,48,0.28);
    --radius: 10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{ font-family:'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--ink-900); -webkit-font-smoothing:antialiased; font-size:13.5px; overflow:hidden; }
  button, select, input, textarea{ font-family:inherit; }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-thumb{ background:#D3D7DE; border-radius:6px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  .app{ display:flex; flex-direction:column; height:100vh; }

  /* ============ TOP BAR ============ */
  .topbar{
    height:52px; flex-shrink:0; background: var(--navy-900); color:#fff;
    display:flex; align-items:center; justify-content:space-between; padding: 0 14px;
    box-shadow: var(--shadow-md); position:relative; z-index:20;
  }
  .tb-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .tb-mark{ width:30px; height:30px; border-radius:8px; background: radial-gradient(circle at 35% 30%, #2a4372, #0B1830 70%); border:1.5px solid var(--gold-500); display:flex; align-items:center; justify-content:center; font-family:'Fraunces', serif; font-weight:600; color: var(--gold-500); font-size:12px; flex-shrink:0; }
  .tb-crumb{ font-size:12px; color: rgba(255,255,255,.55); display:flex; align-items:center; gap:6px; min-width:0; }
  .tb-crumb b{ color:#fff; font-weight:700; }
  .tb-crumb svg{ width:12px; height:12px; flex-shrink:0; opacity:.5; }
  .tb-page-name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }

  .tb-center{ display:flex; align-items:center; gap:4px; background: rgba(255,255,255,0.06); border-radius:9px; padding:3px; }
  .tb-icon-btn{ width:32px; height:32px; border-radius:7px; border:none; background:transparent; color: rgba(255,255,255,.65); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.13s ease; }
  .tb-icon-btn svg{ width:16px; height:16px; }
  .tb-icon-btn:hover{ background: rgba(255,255,255,0.1); color:#fff; }
  .tb-icon-btn.active{ background: var(--gold-500); color: var(--navy-900); }
  .tb-icon-btn:disabled{ opacity:.3; cursor:not-allowed; }
  .tb-sep{ width:1px; height:20px; background: rgba(255,255,255,.15); margin:0 3px; }

  .tb-right{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .btn{ font-weight:700; font-size:12.5px; border-radius:8px; padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; border:1px solid transparent; transition:.13s ease; white-space:nowrap; }
  .btn svg{ width:14px; height:14px; flex-shrink:0; }
  .btn:active{ transform: scale(0.96); }
  .btn-gold{ background: var(--gold-500); color: var(--navy-900); }
  .btn-gold:hover{ background:#D6A94E; }
  .btn-ghost-dark{ background: rgba(255,255,255,0.07); color:#fff; border-color: rgba(255,255,255,0.16); }
  .btn-ghost-dark:hover{ background: rgba(255,255,255,0.15); }
  .btn-exit{ background:transparent; color: rgba(255,255,255,.65); }
  .btn-exit:hover{ color:#fff; }

  /* ============ WORKSPACE ============ */
  .workspace{ flex:1; display:flex; min-height:0; }

  /* ============ LEFT PANEL ============ */
  .side-panel{
    width:300px; flex-shrink:0; background:#fff; border-right:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0; position:relative; z-index:10;
    box-shadow: 2px 0 12px rgba(15,23,42,0.04);
  }
  .panel-view{ display:none; flex-direction:column; min-height:0; flex:1; }
  .panel-view.active{ display:flex; }

  /* -- Elements view -- */
  .panel-topbar{ display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--line-soft); flex-shrink:0; }
  .panel-search{ flex:1; display:flex; align-items:center; gap:8px; background: var(--line-soft); border:1px solid var(--line); border-radius:8px; padding:8px 11px; }
  .panel-search svg{ width:14px; height:14px; color: var(--ink-400); flex-shrink:0; }
  .panel-search input{ border:none; outline:none; background:transparent; font-size:12.5px; width:100%; }
  .panel-mode-btn{ width:34px; height:34px; border-radius:8px; border:1px solid var(--line); background:#fff; color: var(--ink-600); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.13s ease; }
  .panel-mode-btn svg{ width:15px; height:15px; }
  .panel-mode-btn:hover, .panel-mode-btn.active{ background: var(--navy-900); color:#fff; border-color: var(--navy-900); }

  .panel-section-label{ padding:12px 14px 6px; font-size:10.5px; font-weight:700; letter-spacing:.08em; color: var(--gold-600); text-transform:uppercase; }
  .widget-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding: 4px 14px 18px; overflow-y:auto; }
  .widget-card{
    border:1px solid var(--line); border-radius:10px; padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:8px;
    cursor:grab; background:#fff; transition:.13s ease; text-align:center;
  }
  .widget-card:hover{ border-color: var(--gold-500); background: var(--gold-050); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .widget-card.dragging{ opacity:.35; }
  .widget-icon{ width:34px; height:34px; border-radius:9px; background: var(--navy-900); color: var(--gold-500); display:flex; align-items:center; justify-content:center; }
  .widget-icon svg{ width:17px; height:17px; }
  .widget-card span{ font-size:11.3px; font-weight:700; color: var(--ink-900); line-height:1.3; }

  /* -- Layers view -- */
  .layers-list{ flex:1; overflow-y:auto; padding:8px; }
  .layer-row{ display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; cursor:pointer; transition:.12s ease; }
  .layer-row:hover{ background: var(--line-soft); }
  .layer-row.selected{ background: var(--gold-050); border:1px solid var(--gold-100); }
  .layer-row .li-icon{ width:24px; height:24px; border-radius:6px; background: var(--line-soft); color: var(--ink-600); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .layer-row .li-icon svg{ width:12px; height:12px; }
  .layer-row .li-label{ flex:1; font-size:12.5px; font-weight:600; color: var(--ink-900); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .layer-row .li-del{ width:22px; height:22px; border-radius:6px; border:none; background:transparent; color: var(--ink-400); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .layer-row .li-del:hover{ background: var(--red-100); color:#d33; }
  .layer-row .li-del svg{ width:12px; height:12px; }
  .layers-empty{ text-align:center; padding:50px 20px; color: var(--ink-400); font-size:12.5px; line-height:1.6; }
  .layers-empty svg{ width:28px; height:28px; color: var(--line); margin-bottom:10px; }

  /* -- Settings view -- */
  .settings-header{ display:flex; align-items:center; gap:10px; padding:13px 14px; border-bottom:1px solid var(--line-soft); flex-shrink:0; }
  .settings-back{ width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:#fff; color: var(--ink-600); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .settings-back:hover{ background: var(--line-soft); }
  .settings-back svg{ width:15px; height:15px; }
  .settings-icon{ width:32px; height:32px; border-radius:8px; background: var(--navy-900); color: var(--gold-500); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .settings-icon svg{ width:15px; height:15px; }
  .settings-title{ flex:1; min-width:0; }
  .settings-title .t{ font-weight:700; font-size:13px; color: var(--ink-900); }
  .settings-title .s{ font-size:10.8px; color: var(--ink-400); }
  .settings-actions{ display:flex; gap:4px; flex-shrink:0; }
  .sa-btn{ width:28px; height:28px; border-radius:7px; border:1px solid var(--line); background:#fff; color: var(--ink-600); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .sa-btn svg{ width:13px; height:13px; }
  .sa-btn:hover{ background: var(--line-soft); }
  .sa-btn.danger:hover{ background: var(--red-100); color:#d33; border-color:#f3c9c9; }

  .settings-tabs{ display:flex; border-bottom:1px solid var(--line-soft); flex-shrink:0; }
  .settings-tab{ flex:1; padding:11px 4px; text-align:center; font-size:11.5px; font-weight:700; color: var(--ink-400); background:none; border:none; cursor:pointer; border-bottom:2.5px solid transparent; transition:.13s ease; }
  .settings-tab:hover{ color: var(--ink-900); }
  .settings-tab.active{ color: var(--navy-900); border-bottom-color: var(--gold-500); }

  .settings-body{ flex:1; overflow-y:auto; padding: 16px 16px 30px; }
  .settings-panel-tab{ display:none; }
  .settings-panel-tab.active{ display:block; }

  .field-group{ margin-bottom:18px; }
  .field-group-label{ font-size:11px; font-weight:700; color: var(--ink-900); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .field-group-label .val{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color: var(--gold-600); font-weight:600; }
  .field-input, .field-select, .field-textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:12.5px; color: var(--ink-900); background:#fff; transition:.13s ease;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus{ outline:none; border-color: var(--gold-500); box-shadow: 0 0 0 3px rgba(201,154,59,0.14); }
  .field-textarea{ resize:vertical; min-height:64px; line-height:1.5; }
  .field-select{ cursor:pointer; }
  .field-hint{ font-size:10.5px; color: var(--ink-400); margin-top:12px; line-height:1.6; text-align:center; padding: 10px; background: var(--line-soft); border-radius:8px; }

  .range-row{ display:flex; align-items:center; gap:10px; }
  input[type="range"]{ flex:1; accent-color: var(--gold-500); cursor:pointer; }
  input[type="color"]{ width:36px; height:32px; border:1px solid var(--line); border-radius:7px; padding:2px; cursor:pointer; background:#fff; flex-shrink:0; }
  .color-field-row{ display:flex; align-items:center; gap:9px; }
  .color-field-row .field-input{ flex:1; font-family:'IBM Plex Mono', monospace; font-size:11.5px; }

  .btn-group{ display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .btn-group button{ flex:1; padding:8px 4px; background:#fff; border:none; border-right:1px solid var(--line); color: var(--ink-600); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.13s ease; }
  .btn-group button:last-child{ border-right:none; }
  .btn-group button svg{ width:14px; height:14px; }
  .btn-group button:hover{ background: var(--line-soft); }
  .btn-group button.active{ background: var(--navy-900); color:#fff; }

  .preset-swatches{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .preset-swatch{ width:38px; height:38px; border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer; }
  .preset-swatch img{ width:100%; height:100%; object-fit:cover; }
  .preset-swatch.active{ border-color: var(--gold-500); }

  .spacing-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .spacing-field label{ font-size:10px; font-weight:700; color: var(--ink-400); text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:5px; }
  .stepper-field{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .stepper-field input{width:100%;border:none;outline:none;padding:8px 10px;font-size:12.5px;background:transparent}
  .stepper-buttons{display:flex;flex-direction:column;border-left:1px solid var(--line);background:var(--line-soft)}
  .stepper-buttons button{width:30px;height:18px;border:none;background:transparent;color:var(--ink-600);cursor:pointer;font-size:11px;font-weight:800;line-height:1}
  .stepper-buttons button:hover{background:#e4e7ed;color:var(--navy-900)}
  .align-stack{display:grid;gap:10px}
  .align-axis-label{display:block;margin-bottom:6px;color:var(--ink-400);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}

  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding: 10px 0; border-bottom:1px solid var(--line-soft); }
  .toggle-row:last-child{ border-bottom:none; }
  .toggle-row label{ font-size:12px; font-weight:600; color: var(--ink-600); }
  .switch{ position:relative; width:38px; height:22px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch-track{ position:absolute; inset:0; background: var(--line); border-radius:20px; cursor:pointer; transition:.15s ease; }
  .switch-track::before{ content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s ease; box-shadow: var(--shadow-sm); }
  .switch input:checked + .switch-track{ background: var(--gold-500); }
  .switch input:checked + .switch-track::before{ transform: translateX(16px); }

  /* ============ CANVAS ============ */
  .canvas-area{ flex:1; overflow-y:auto; overflow-x:hidden; background: var(--bg); padding: 34px 30px 100px; display:flex; justify-content:center; }
  .canvas-page{
    width:100%; max-width:1180px; background:#fff; border-radius:14px; box-shadow: var(--shadow-md);
    min-height:600px; transition: max-width .25s ease; padding: 0; position:relative;
  }
  .canvas-page.tablet{ max-width:760px; }
  .canvas-page.mobile{ max-width:380px; }

  .drop-zone{ height:8px; margin:2px 0; border-radius:6px; transition:.13s ease; position:relative; }
  .drop-zone.active-zone{ height:44px; background: var(--gold-050); border:1.5px dashed var(--gold-500); display:flex; align-items:center; justify-content:center; }
  .drop-zone.active-zone::after{ content:'Drop widget here'; font-size:11px; font-weight:700; color: var(--gold-600); }

  .el-wrap{ position:relative; border:1.5px solid transparent; border-radius:8px; transition:.1s ease; cursor:pointer; }
  .el-wrap:hover{ border-color: rgba(201,154,59,0.45); }
  .el-wrap.selected{ border-color: var(--gold-500); }
  .el-wrap .el-inner{ padding: 18px 22px; }
  .el-wrap.dragging-el{ opacity:.35; }
  .el-wrap.device-hidden .el-inner{ opacity:.32; filter:grayscale(.4); }
  .hidden-badge{
    position:absolute; top:-13px; left:50%; transform:translateX(-50%); background: var(--ink-900); color:#fff;
    font-size:9px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:3px 9px; border-radius:5px; z-index:6; white-space:nowrap;
  }
  body.preview-mode .el-wrap.device-hidden{ display:none; }
  body.preview-mode .hidden-badge{ display:none; }

  @keyframes animFadeIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes animSlideUp{ from{ opacity:0; transform:translateY(24px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes animZoomIn{ from{ opacity:0; transform:scale(.92); } to{ opacity:1; transform:scale(1); } }
  .anim-fade{ animation: animFadeIn .5s ease; }
  .anim-slide{ animation: animSlideUp .5s ease; }
  .anim-zoom{ animation: animZoomIn .4s ease; }

  .el-controls{ position:absolute; top:-13px; right:8px; display:none; align-items:center; gap:3px; background: var(--navy-900); border-radius:7px; padding:3px; box-shadow: var(--shadow-md); z-index:5; }
  .el-wrap:hover .el-controls, .el-wrap.selected .el-controls{ display:flex; }
  .el-controls button{ width:23px; height:23px; border-radius:5px; border:none; background:transparent; color: rgba(255,255,255,.75); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .el-controls button:hover{ background: rgba(255,255,255,0.14); color:#fff; }
  .el-controls button svg{ width:12px; height:12px; }
  .el-controls .drag-grip{ cursor:grab; }

  .el-label{ position:absolute; top:-13px; left:8px; background: var(--gold-500); color: var(--navy-900); font-size:9.5px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:3px 8px; border-radius:5px; display:none; z-index:5; }
  .el-wrap:hover .el-label, .el-wrap.selected .el-label{ display:block; }

  .canvas-empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:560px; color: var(--ink-400); text-align:center; padding:40px; }
  .canvas-empty svg{ width:44px; height:44px; color: var(--line); margin-bottom:16px; }
  .canvas-empty h3{ font-family:'Fraunces', serif; font-size:19px; font-weight:600; color: var(--ink-600); margin-bottom:6px; }
  .canvas-empty p{ font-size:12.5px; max-width:280px; line-height:1.6; }

  /* preview mode: hide all editor chrome */
  body.preview-mode .side-panel{ display:none; }
  body.preview-mode .drop-zone{ display:none !important; }
  body.preview-mode .el-wrap{ border-color:transparent !important; cursor:default; }
  body.preview-mode .el-controls, body.preview-mode .el-label{ display:none !important; }
  body.preview-mode .canvas-area{ padding:40px; }
  body.preview-mode .tb-icon-btn.preview-toggle{ background: var(--gold-500); color: var(--navy-900); }

  /* ============ TOASTS ============ */
  .toast-stack{ position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:200; }
  .toast{ background: var(--navy-900); color:#fff; font-size:12.5px; font-weight:600; padding: 11px 16px; border-radius:10px; box-shadow: var(--shadow-lg); display:flex; align-items:center; gap:8px; opacity:0; transform: translateY(8px); animation: toastIn .2s ease forwards, toastOut .2s ease forwards 2.7s; }
  .toast svg{ width:14px; height:14px; color: var(--gold-500); flex-shrink:0; }
  @keyframes toastIn{ to{ opacity:1; transform: translateY(0); } }
  @keyframes toastOut{ to{ opacity:0; transform: translateY(-6px); } }


  /* ============ ENHANCED BUILDER UI ============ */
  .save-state{font-size:10.5px;color:rgba(255,255,255,.55);min-width:74px;text-align:right}
  .save-state.dirty{color:#FFD783}.save-state.saved{color:#9CE1C1}
  .tb-mini-select{height:32px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff;border-radius:7px;padding:0 8px;font-size:11px;outline:none}
  .tb-mini-select option{color:#161D2B;background:#fff}
  .widget-library{flex:1;overflow-y:auto;padding-bottom:18px}
  .widget-category{padding:12px 14px 6px;font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--gold-600);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
  .widget-category small{font-size:9px;color:var(--ink-400);letter-spacing:0;text-transform:none;font-weight:600}
  .widget-grid{overflow:visible;padding-bottom:6px}
  .widget-card{position:relative;user-select:none}
  .widget-card::after{content:'Click or drag';position:absolute;bottom:4px;font-size:8px;color:transparent;transition:.12s}
  .widget-card:hover::after{color:var(--ink-400)}
  .widget-card span{padding-bottom:5px}
  .canvas-page{transform-origin:top center}
  .canvas-page-grid{background-image:linear-gradient(rgba(11,24,48,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(11,24,48,.025) 1px,transparent 1px);background-size:20px 20px}
  .canvas-status{position:fixed;bottom:16px;left:320px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-md);border-radius:9px;padding:8px 11px;font-size:10.5px;color:var(--ink-600);z-index:18;display:flex;align-items:center;gap:10px}
  .canvas-status b{color:var(--navy-900)}
  body.preview-mode .canvas-status{left:16px}
  .upload-box{border:1.5px dashed var(--line);border-radius:10px;padding:14px;text-align:center;background:var(--line-soft);margin-bottom:12px}
  .upload-box input{display:none}.upload-box label{cursor:pointer;font-weight:700;font-size:11.5px;color:var(--navy-900)}
  .upload-box p{font-size:10px;color:var(--ink-400);margin-top:4px}
  .inline-editing{outline:2px dashed var(--gold-500)!important;outline-offset:4px;border-radius:3px}
  .empty-search{grid-column:1/-1;padding:28px 10px;text-align:center;color:var(--ink-400);font-size:12px}
  .kbd{font-family:'IBM Plex Mono',monospace;background:var(--line-soft);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:2px 5px;font-size:9px}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(8,17,34,.68);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
  .modal-backdrop.open{display:flex}

  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .modal-grid .full{grid-column:1/-1}
  .template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .template-card{border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:.15s;background:#fff}
  .template-card:hover{border-color:var(--gold-500);transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .template-preview{height:120px;padding:12px;background:#f5f6f8;display:flex;flex-direction:column;gap:8px}
  .template-preview i{display:block;background:#d9dde5;border-radius:4px;height:10px}.template-preview i.hero{height:45px;background:#122544}.template-preview i.gold{width:35%;background:#C99A3B}.template-preview i.short{width:60%}
  .template-meta{padding:12px}.template-meta b{display:block;font-size:12.5px;margin-bottom:3px}.template-meta span{font-size:10.5px;color:var(--ink-400)}
  .code-output{width:100%;min-height:260px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.55;background:#0B1830;color:#e8edf7;border:none;border-radius:10px;padding:14px;resize:vertical}
  .shortcut-grid{display:grid;grid-template-columns:1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:11.5px}

  /* New widget presentation */

  .gallery-grid{display:grid;gap:10px}.gallery-grid img{width:100%;height:160px;object-fit:cover;display:block}
  .accordion-item{border-bottom:1px solid var(--line)}.accordion-title{width:100%;border:none;background:transparent;padding:14px 0;display:flex;justify-content:space-between;font-weight:700;cursor:pointer;text-align:left}.accordion-content{display:none;padding:0 0 14px;color:var(--ink-600);line-height:1.6}.accordion-item.open .accordion-content{display:block}
  .tabs-head{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:14px}.tab-chip{border:none;background:transparent;padding:9px 12px;font-weight:700;color:var(--ink-400);border-bottom:2px solid transparent;cursor:pointer}.tab-chip.active{color:var(--navy-900);border-bottom-color:var(--gold-500)}
  .counter-widget{text-align:center}.counter-widget strong{font-family:'Fraunces',serif;display:block;line-height:1}.counter-widget span{display:block;margin-top:7px;color:var(--ink-600)}
  .callout-widget{display:flex;gap:14px;align-items:flex-start}.callout-icon{flex:0 0 auto;display:flex;align-items:center;justify-content:center}.callout-widget h4{font-family:'Fraunces',serif;margin-bottom:5px}.callout-widget p{line-height:1.6;color:var(--ink-600)}
  .form-widget{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-widget .full{grid-column:1/-1}.form-widget input,.form-widget textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:12px}.form-widget button{border:none;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer}
  .social-widget{display:flex;gap:8px;flex-wrap:wrap}.social-widget a{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:800}

  @media(max-width:900px){.tb-crumb span:not(.tb-page-name),.btn-exit,.save-state{display:none}.side-panel{width:270px}.canvas-status{left:288px}.template-grid{grid-template-columns:1fr}.modal-grid{grid-template-columns:1fr}.modal-grid .full{grid-column:auto}}

<script>
/* ============================================================
   ICONS

const ICONS = {

function defaultBox(){ return { bg:'transparent', borderWidth:0, borderColor:'#E4E7ED', borderStyle:'solid', borderRadius:0, shadow:false, height:0, minHeight:0 }; }
function defaultAdvanced(){ return { marginTop:0, marginRight:0, marginBottom:0, marginLeft:0, paddingTop:0, paddingBottom:0, paddingLeft:0, paddingRight:0, cssId:'', cssClasses:'', customCss:'', zIndex:'', opacity:100, hideDesktop:false, hideTablet:false, hideMobile:false, animation:'none' }; }

function defaultsFor(type){
  let base;
  switch(type){
    case 'heading': base = { content:{ text:"Add Your Heading Text Here", tag:"h2" }, style:{ fontSize:32, fontWeight:"700", color:"#161D2B", align:"left", letterSpacing:0, transform:"none" } }; break;

    case 'spacer': base = { content:{}, style:{ height:40 } }; break;
    default: base = { content:{}, style:{} };
  }
  base.box = defaultBox();
  base.advanced = defaultAdvanced();
  return base;
}

/* ============================================================
   STATE
============================================================ */
let elements = [
  Object.assign({ id: uid(), type:'heading' }, defaultsFor('heading'), { content:{ text:"Robe Integrated Research Center", tag:"h1" }, style:{ fontSize:40, fontWeight:"700", color:"#0B1830", align:"left", letterSpacing:0, transform:"none" } }),
  Object.assign({ id: uid(), type:'text' }, defaultsFor('text'), { content:{ text:"A multidisciplinary hub for applied research in public health, agriculture, and rural development — supporting Madda Walabu University's mission across South-East Ethiopia." } }),
  Object.assign({ id: uid(), type:'button' }, defaultsFor('button'), { content:{ text:"Explore Research Areas", link:"/research-areas" } }),
  Object.assign({ id: uid(), type:'spacer' }, defaultsFor('spacer')),
  Object.assign({ id: uid(), type:'columns' }, defaultsFor('columns')),
];
let selectedId = null;
let currentDevice = 'desktop';
let history = [];
let historyIndex = -1;
let dragPayload = null; // { kind:'new', widgetType } or { kind:'move', id }

function uid(){ return 'el_' + Math.random().toString(36).slice(2,10); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nl2li(s){ return (s||'').split('\n').map(x=>x.trim()).filter(Boolean); }

/* ============================================================
   HISTORY
============================================================ */
function pushHistory(){
  history = history.slice(0, historyIndex+1);
  history.push(JSON.stringify(elements));
  historyIndex++;
  if(history.length > 40){ history.shift(); historyIndex--; }
  updateHistoryButtons();
}
function undo(){
  if(historyIndex <= 0) return;
  historyIndex--;
  elements = JSON.parse(history[historyIndex]);
  selectedId = null;
  renderAll();
  updateHistoryButtons();
  showToast('Undid last change');
}
function redo(){
  if(historyIndex >= history.length-1) return;
  historyIndex++;
  elements = JSON.parse(history[historyIndex]);
  selectedId = null;
  renderAll();
  updateHistoryButtons();
  showToast('Redid change');
}
function updateHistoryButtons(){
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= history.length-1;
}

/* ============================================================
   TOAST
============================================================ */
function showToast(msg){
  if(!msg) return;
  const stack = document.getElementById('toastStack');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = svgIcon('check',14) + '<span>'+msg+'</span>';
  stack.appendChild(toast);
  setTimeout(()=> toast.remove(), 3000);
}
document.body.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-toast]');
  if(el) showToast(el.getAttribute('data-toast'));
});

/* ============================================================
   RENDER: WIDGET PALETTE
============================================================ */
const widgetGrid = document.getElementById('widgetGrid');
function renderPalette(filter=''){
  widgetGrid.innerHTML = '';
  WIDGETS.filter(w => w.label.toLowerCase().includes(filter.toLowerCase())).forEach(w=>{
    const card = document.createElement('div');
    card.className = 'widget-card';
    card.draggable = true;
    card.innerHTML = `<div class="widget-icon">${svgIcon(w.icon,17)}</div><span>${w.label}</span>`;
    card.addEventListener('dragstart', (e)=>{
      dragPayload = { kind:'new', widgetType: w.type };
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('text/plain', w.type);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', ()=> card.classList.remove('dragging'));
    widgetGrid.appendChild(card);
  });
}
renderPalette();
document.getElementById('widgetSearch').addEventListener('input', (e)=> renderPalette(e.target.value));

/* ============================================================
   RENDER: ELEMENT MARKUP
============================================================ */
function elementInnerHTML(el){
  const s = el.style, c = el.content;
  switch(el.type){
    case 'heading':
      return `<${c.tag} style="font-family:'Fraunces',serif; font-weight:${s.fontWeight}; font-size:${s.fontSize}px; color:${s.color}; text-align:${s.align}; line-height:1.22; margin:0; letter-spacing:${s.letterSpacing||0}px; text-transform:${s.transform||'none'};">${escapeHtml(c.text)}</${c.tag}>`;
    case 'text':
      return `<p style="font-size:${s.fontSize}px; color:${s.color}; text-align:${s.align}; line-height:${s.lineHeight}; margin:0; letter-spacing:${s.letterSpacing||0}px;">${escapeHtml(c.text)}</p>`;
    case 'image':
      return `<div style="text-align:${s.align};"><img src="${c.src}" alt="${escapeHtml(c.alt)}" style="width:${s.width}%; max-width:100%; border-radius:${s.radius}px; display:inline-block;"></div>`;
    case 'button': {
      const pad = s.size==='sm' ? '8px 16px' : s.size==='lg' ? '16px 30px' : '12px 24px';
      const fsz = s.size==='sm' ? '12px' : s.size==='lg' ? '16px' : '13.5px';
      const bw = s.borderWidth||0;
      return `<div style="text-align:${s.align};"><span style="display:inline-block; background:${s.bg}; color:${s.color}; padding:${pad}; border-radius:${s.radius}px; font-weight:700; font-size:${fsz}; cursor:pointer; border:${bw}px solid ${s.borderColor||'transparent'};">${escapeHtml(c.text)}</span></div>`;
    }
    case 'icon-box': {
      const alignItems = s.align==='left' ? 'flex-start' : s.align==='right' ? 'flex-end' : 'center';
      const isz = s.iconSize || 52;
      return `<div style="text-align:${s.align}; display:flex; flex-direction:column; align-items:${alignItems};">
        <div style="width:${isz}px;height:${isz}px;border-radius:14px;background:${s.iconBg};color:${s.iconColor};display:flex;align-items:center;justify-content:center;margin-bottom:14px;">${svgIcon(c.icon, Math.round(isz*0.42))}</div>
        <h4 style="font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin-bottom:6px; color:#161D2B;">${escapeHtml(c.title)}</h4>
        <p style="font-size:13px; color:#4B5468; line-height:1.6; margin:0; max-width:320px;">${escapeHtml(c.text)}</p>
      </div>`;
    }
    case 'list': {
      const items = nl2li(c.items);
      return `<ul style="list-style:none; margin:0; padding:0;">${items.map(it=>`<li style="padding:${s.gap||9}px 0; border-bottom:1px solid #EDEFF3; font-size:${s.fontSize}px; color:${s.color}; display:flex; align-items:center; gap:10px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${s.markerColor||'#C99A3B'}" stroke-width="2.6" style="flex-shrink:0;"><path d="M20 6L9 17l-5-5"/></svg>${escapeHtml(it)}</li>`).join('')}</ul>`;
    }
    case 'testimonial': {
      const initials = (c.name||'').split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase();
      return `<div style="background:${s.bg}; border-radius:${s.radius}px; padding:26px;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="${s.accent}" style="margin-bottom:12px; opacity:.4;"><path d="M9 7H4a1 1 0 00-1 1v6a1 1 0 001 1h4v3l4-4V8a1 1 0 00-1-1H9zm11 0h-5a1 1 0 00-1 1v6a1 1 0 001 1h4v3l4-4V8a1 1 0 00-1-1h-2z"/></svg>
        <p style="font-family:'Fraunces',serif; font-size:16px; font-style:italic; color:#161D2B; line-height:1.55; margin-bottom:16px;">"${escapeHtml(c.quote)}"</p>
        <div style="display:flex; align-items:center; gap:11px;">
          <div style="width:36px;height:36px;border-radius:50%;background:${s.accent};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">${initials}</div>
          <div><div style="font-weight:700; font-size:13px; color:#161D2B;">${escapeHtml(c.name)}</div><div style="font-size:11.5px; color:#8A93A6;">${escapeHtml(c.role)}</div></div>
        </div>
      </div>`;
    }
    case 'columns':
      return `<div style="display:flex; gap:${s.gap}px; background:${s.bg};">
        <div style="flex:1; font-size:14px; color:#4B5468; line-height:1.7;">${escapeHtml(c.left)}</div>
        <div style="flex:1; font-size:14px; color:#4B5468; line-height:1.7;">${escapeHtml(c.right)}</div>
      </div>`;
    case 'divider': {
      const justify = s.align==='left' ? 'flex-start' : s.align==='right' ? 'flex-end' : 'center';
      return `<div style="display:flex; justify-content:${justify};"><div style="width:${s.width}%; border-top:${s.thickness}px ${s.lineStyle||'solid'} ${s.color};"></div></div>`;
    }
    case 'spacer':
      return `<div style="height:${s.height}px;"></div>`;
    default: return '';
  }
}

function composeWrapStyle(el){
  const a = el.advanced || {};
  const b = el.box || defaultBox();
  const mt = a.marginTop ?? 0, mr = a.marginRight ?? 0, mb = a.marginBottom ?? 0, ml = a.marginLeft ?? 0;
  const pt = a.paddingTop ?? 0, pb = a.paddingBottom ?? 0, pl = a.paddingLeft ?? 0, pr = a.paddingRight ?? 0;
  let style = `padding:${pt}px ${pr}px ${pb}px ${pl}px; margin:${mt}px ${mr}px ${mb}px ${ml}px;`;
  style += `background:${b.bg||'transparent'};`;
  if(b.borderWidth) style += `border:${b.borderWidth}px ${b.borderStyle||'solid'} ${b.borderColor};`;
  if(b.borderRadius) style += `border-radius:${b.borderRadius}px;`;
  if(b.shadow) style += `box-shadow:0 10px 30px rgba(15,23,42,0.12);`;
  if((b.height||0) > 0) style += `height:${b.height}px;`;
  if((b.minHeight||0) > 0) style += `min-height:${b.minHeight}px;`;
  const opacity = a.opacity!=null ? a.opacity : 100;
  style += `opacity:${opacity/100};`;
  if(a.zIndex) style += `position:relative; z-index:${a.zIndex};`;
  if(el.style && el.style.verticalAlign){
    const map={top:'flex-start',middle:'center',bottom:'flex-end'};
    style += `display:flex; flex-direction:column; justify-content:${map[el.style.verticalAlign]||'flex-start'};`;
  }
  return style;
}
function isHiddenForDevice(el, device){
  const a = el.advanced || {};
  if(device==='desktop') return !!a.hideDesktop;
  if(device==='tablet') return !!a.hideTablet;
  if(device==='mobile') return !!a.hideMobile;
  return false;
}
function animationClass(el){
  const anim = (el.advanced||{}).animation;
  if(!anim || anim==='none') return '';
  return 'anim-' + anim;
}

/* ============================================================
   RENDER: CANVAS
============================================================ */
const canvasPage = document.getElementById('canvasPage');

function renderCanvas(){
  if(elements.length === 0){
    canvasPage.innerHTML = `<div class="canvas-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <h3>This page is empty</h3>
      <p>Drag a widget from the left panel and drop it here to start building.</p>
    </div>` + dropZoneHTML(0);
    wireDropZones();
    return;
  }

  let html = dropZoneHTML(0);
  elements.forEach((el, idx)=>{
    const w = WIDGETS.find(w=>w.type===el.type) || {label:el.type, icon:'heading'};
    const hidden = isHiddenForDevice(el, currentDevice);
    const cssClasses = (el.advanced && el.advanced.cssClasses) ? ' ' + el.advanced.cssClasses.trim() : '';
    html += `
      <div class="el-wrap ${selectedId===el.id?'selected':''} ${hidden?'device-hidden':''}" data-id="${el.id}" draggable="true">
        <div class="el-label">${w.label}</div>
        ${hidden ? `<div class="hidden-badge">Hidden on ${currentDevice}</div>` : ''}
        <div class="el-controls">
          <button class="drag-grip" title="Drag">${svgIcon('drag',12)}</button>
          <button class="dup-el" title="Duplicate" data-id="${el.id}">${svgIcon('dup',12)}</button>
          <button class="del-el" title="Delete" data-id="${el.id}">${svgIcon('del',12)}</button>
        </div>
        <div class="el-inner ${el.id} ${animationClass(el)}${cssClasses}" style="${composeWrapStyle(el)}">${elementInnerHTML(el)}</div>
      </div>
      ${dropZoneHTML(idx+1)}
    `;
  });
  canvasPage.innerHTML = html;
  wireCanvasEvents();
  wireDropZones();
  rebuildCustomStyles();
}

function dropZoneHTML(index){
  return `<div class="drop-zone" data-index="${index}"></div>`;
}

function wireCanvasEvents(){
  canvasPage.querySelectorAll('.el-wrap').forEach(wrap=>{
    const id = wrap.dataset.id;
    wrap.addEventListener('click', (e)=>{
      e.stopPropagation();
      selectElement(id);
    });
    wrap.addEventListener('dragstart', (e)=>{
      dragPayload = { kind:'move', id };
      wrap.classList.add('dragging-el');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    });
    wrap.addEventListener('dragend', ()=>{
      wrap.classList.remove('dragging-el');
      dragPayload = null;
    });
    wrap.querySelector('.dup-el').addEventListener('click', (e)=>{
      e.stopPropagation();
      duplicateElement(id);
    });
    wrap.querySelector('.del-el').addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteElement(id);
    });
  });
}

function wireDropZones(){
  canvasPage.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.addEventListener('dragover', (e)=>{
      e.preventDefault();
      zone.classList.add('active-zone');
    });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('active-zone'));
    zone.addEventListener('drop', (e)=>{
      e.preventDefault();
      zone.classList.remove('active-zone');
      const targetIndex = parseInt(zone.dataset.index);
      if(!dragPayload) return;

      if(dragPayload.kind === 'new'){
        const def = defaultsFor(dragPayload.widgetType);
        const newEl = Object.assign({ id: uid(), type: dragPayload.widgetType, advanced:{} }, def);
        elements.splice(targetIndex, 0, newEl);
        selectedId = newEl.id;
        pushHistory();
        renderAll();
        openSettingsFor(newEl.id);
      } else if(dragPayload.kind === 'move'){
        const fromIndex = elements.findIndex(el => el.id === dragPayload.id);
        if(fromIndex === -1) return;
        const [moved] = elements.splice(fromIndex, 1);
        const adjIndex = fromIndex < targetIndex ? targetIndex - 1 : targetIndex;
        elements.splice(adjIndex, 0, moved);
        pushHistory();
        renderAll();
      }
      dragPayload = null;
    });
  });
}

document.addEventListener('click', ()=>{ deselectAll(); });
canvasPage.addEventListener('click', (e)=> e.stopPropagation());

function deselectAll(){
  if(selectedId === null) return;
  selectedId = null;
  document.querySelectorAll('.el-wrap.selected').forEach(w=>w.classList.remove('selected'));
  switchLeftView('elements');
}

/* ============================================================
   ELEMENT ACTIONS
============================================================ */
function duplicateElement(id){
  const idx = elements.findIndex(el=>el.id===id);
  if(idx===-1) return;
  const copy = JSON.parse(JSON.stringify(elements[idx]));
  copy.id = uid();
  elements.splice(idx+1, 0, copy);
  pushHistory();
  selectedId = copy.id;
  renderAll();
  openSettingsFor(copy.id);
  showToast('Widget duplicated');
}
function deleteElement(id){
  const idx = elements.findIndex(el=>el.id===id);
  if(idx===-1) return;
  elements.splice(idx,1);
  if(selectedId===id) selectedId=null;
  pushHistory();
  renderAll();
  if(selectedId===null) switchLeftView('elements');
  showToast('Widget deleted');
}
function selectElement(id){
  selectedId = id;
  document.querySelectorAll('.el-wrap').forEach(w=> w.classList.toggle('selected', w.dataset.id===id));
  openSettingsFor(id);
}

/* ============================================================
   LEFT PANEL VIEW SWITCHING
============================================================ */
function switchLeftView(view){
  document.querySelectorAll('.panel-view').forEach(v=>v.classList.remove('active'));
  if(view==='elements') document.getElementById('viewElements').classList.add('active');
  if(view==='layers') document.getElementById('viewLayers').classList.add('active');
  if(view==='settings') document.getElementById('viewSettings').classList.add('active');
  document.getElementById('modeElementsBtn').classList.toggle('active', view==='elements');
  document.getElementById('modeLayersBtn').classList.toggle('active', view==='layers');
}
document.getElementById('modeElementsBtn').addEventListener('click', ()=> switchLeftView('elements'));
document.getElementById('modeLayersBtn').addEventListener('click', ()=>{ renderLayers(); switchLeftView('layers'); });
document.getElementById('backToElementsBtn').addEventListener('click', ()=> switchLeftView('elements'));
document.getElementById('settingsBackBtn').addEventListener('click', ()=>{ deselectAll(); switchLeftView('elements'); });

/* ============================================================
   LAYERS / NAVIGATOR
============================================================ */
function renderLayers(){
  const list = document.getElementById('layersList');
  if(elements.length===0){
    list.innerHTML = `<div class="layers-empty">${svgIcon('columns',28)}<div>No widgets on this page yet. Add one from the Elements panel.</div></div>`;
    return;
  }
  list.innerHTML = '';
  elements.forEach(el=>{
    const w = WIDGETS.find(w=>w.type===el.type) || {label:el.type, icon:'heading'};
    const row = document.createElement('div');
    row.className = 'layer-row' + (selectedId===el.id ? ' selected' : '');
    row.innerHTML = `<div class="li-icon">${svgIcon(w.icon,12)}</div><div class="li-label">${w.label}</div><button class="li-del" data-id="${el.id}">${svgIcon('del',12)}</button>`;
    row.addEventListener('click', (e)=>{
      if(e.target.closest('.li-del')) return;
      selectElement(el.id);
      switchLeftView('settings');
    });
    row.querySelector('.li-del').addEventListener('click', (e)=>{ e.stopPropagation(); deleteElement(el.id); renderLayers(); });
    list.appendChild(row);
  });
}

/* ============================================================
   SETTINGS PANEL
============================================================ */
function openSettingsFor(id){
  const el = elements.find(e=>e.id===id);
  if(!el) return;
  const w = WIDGETS.find(w=>w.type===el.type) || {label:el.type, icon:'heading'};
  document.getElementById('settingsIcon').innerHTML = svgIcon(w.icon,15);
  document.getElementById('settingsTitle').textContent = w.label;
  document.getElementById('settingsSub').textContent = 'Editing widget';
  renderContentFields(el);
  renderStyleFields(el);
  renderAdvancedFields(el);
  switchLeftView('settings');
  // default to content tab
  document.querySelectorAll('.settings-tab').forEach(t=>t.classList.toggle('active', t.dataset.stab==='content'));
  document.querySelectorAll('.settings-panel-tab').forEach(p=>p.classList.toggle('active', p.dataset.spanel==='content'));
}

document.querySelectorAll('.settings-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.settings-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.stab;
    document.querySelectorAll('.settings-panel-tab').forEach(p=>p.classList.toggle('active', p.dataset.spanel===target));
  });
});

document.getElementById('dupBtn').addEventListener('click', ()=>{ if(selectedId) duplicateElement(selectedId); });
document.getElementById('delBtn').addEventListener('click', ()=>{ if(selectedId) deleteElement(selectedId); });

function reRenderElement(el){
  const wrap = canvasPage.querySelector(`.el-wrap[data-id="${el.id}"]`);
  if(wrap){
    const inner = wrap.querySelector('.el-inner');
    inner.innerHTML = elementInnerHTML(el);
    inner.setAttribute('style', composeWrapStyle(el));
    const cssClasses = (el.advanced && el.advanced.cssClasses) ? ' ' + el.advanced.cssClasses.trim() : '';
    inner.className = `el-inner ${el.id} ${animationClass(el)}${cssClasses}`;
  }
}
function rebuildCustomStyles(){
  let existing = document.getElementById('customElementStyles');
  if(!existing){
    existing = document.createElement('style');
    existing.id = 'customElementStyles';
    document.head.appendChild(existing);
  }
  const rules = elements
    .filter(el => el.advanced && el.advanced.customCss && el.advanced.customCss.trim())
    .map(el => `.${el.id} { ${el.advanced.customCss} }`)
    .join('\n');
  existing.textContent = rules;
}
function replayAnimation(id){
  const inner = canvasPage.querySelector(`.el-inner.${id}`);
  if(!inner) return;
  inner.style.animation = 'none';
  void inner.offsetWidth;
  const el = elements.find(e=>e.id===id);
  inner.className = `el-inner ${id} ${animationClass(el)}`;
}

/* ---- CONTENT TAB ---- */
function renderContentFields(el){
  const box = document.getElementById('contentFields');
  const c = el.content;
  let html = '';
  switch(el.type){
    case 'heading':
      html += fieldInput('Heading text', 'headingText', c.text);
      html += fieldSelect('HTML tag', 'headingTag', ['h1','h2','h3','h4'], c.tag);
      break;
    case 'text':
      html += fieldTextarea('Text content', 'textContent', c.text);
      break;
    case 'image':
      html += `<div class="field-group"><div class="field-group-label">Choose image</div>
        <div class="preset-swatches">${IMAGE_PRESETS.map(src=>`<div class="preset-swatch ${src===c.src?'active':''}" data-src="${src}"><img src="${src}"></div>`).join('')}</div>
      </div>`;
      html += fieldInput('Custom image URL', 'imageSrc', c.src);
      html += fieldInput('Alt text', 'imageAlt', c.alt);
      break;
    case 'button':
      html += fieldInput('Button text', 'btnText', c.text);
      html += fieldInput('Link URL', 'btnLink', c.link);
      break;
    case 'icon-box':
      html += `<div class="field-group"><div class="field-group-label">Icon</div>
        <select class="field-select" id="f_iconType">
          ${['starIcon','shieldIcon','bookIcon','usersIcon','heartIcon','globeIcon'].map(i=>`<option value="${i}" ${i===c.icon?'selected':''}>${i.replace('Icon','')}</option>`).join('')}
        </select></div>`;
      html += fieldInput('Title', 'iconTitle', c.title);
      html += fieldTextarea('Description', 'iconText', c.text);
      break;
    case 'list':
      html += fieldTextarea('List items (one per line)', 'listItems', c.items, 6);
      break;
    case 'testimonial':
      html += fieldTextarea('Quote', 'testiQuote', c.quote);
      html += fieldInput('Name', 'testiName', c.name);
      html += fieldInput('Role / title', 'testiRole', c.role);
      break;
    case 'columns':
      html += fieldTextarea('Left column content', 'colLeft', c.left);
      html += fieldTextarea('Right column content', 'colRight', c.right);
      break;
    case 'divider':
    case 'spacer':
      html += `<div class="field-hint">This widget has no content settings — adjust its appearance from the Style tab.</div>`;
      break;
  }
  box.innerHTML = html;
  bindContentEvents(el);
}

function fieldInput(label, id, value){
  return `<div class="field-group"><div class="field-group-label">${label}</div><input class="field-input" id="f_${id}" type="text" value="${escapeHtml(value||'')}"></div>`;
}
function fieldTextarea(label, id, value, rows=4){
  return `<div class="field-group"><div class="field-group-label">${label}</div><textarea class="field-textarea" id="f_${id}" rows="${rows}">${escapeHtml(value||'')}</textarea></div>`;
}
function fieldSelect(label, id, options, value){
  return `<div class="field-group"><div class="field-group-label">${label}</div><select class="field-select" id="f_${id}">${options.map(o=>`<option ${o===value?'selected':''}>${o}</option>`).join('')}</select></div>`;
}

function bindContentEvents(el){
  const c = el.content;
  const bind = (id, cb, evt='input') => { const node = document.getElementById('f_'+id); if(node) node.addEventListener(evt, ()=> cb(node.value)); };

  bind('headingText', v=>{ c.text=v; reRenderElement(el); });
  bind('headingTag', v=>{ c.tag=v; reRenderElement(el); }, 'change');
  bind('textContent', v=>{ c.text=v; reRenderElement(el); });
  bind('imageSrc', v=>{ c.src=v; reRenderElement(el); renderContentFields(el); });
  bind('imageAlt', v=>{ c.alt=v; reRenderElement(el); });
  bind('btnText', v=>{ c.text=v; reRenderElement(el); });
  bind('btnLink', v=>{ c.link=v; reRenderElement(el); });
  bind('iconType', v=>{ c.icon=v; reRenderElement(el); }, 'change');
  bind('iconTitle', v=>{ c.title=v; reRenderElement(el); });
  bind('iconText', v=>{ c.text=v; reRenderElement(el); });
  bind('listItems', v=>{ c.items=v; reRenderElement(el); });
  bind('testiQuote', v=>{ c.quote=v; reRenderElement(el); });
  bind('testiName', v=>{ c.name=v; reRenderElement(el); });
  bind('testiRole', v=>{ c.role=v; reRenderElement(el); });
  bind('colLeft', v=>{ c.left=v; reRenderElement(el); });
  bind('colRight', v=>{ c.right=v; reRenderElement(el); });

function wireStepperControl(inputId, onChange){
  const input=document.getElementById(inputId);
  if(!input) return;
  const apply=()=>onChange(Number(input.value)||0);
  input.addEventListener('input', apply);
  input.addEventListener('change', ()=>{ apply(); pushHistory(); });
  document.querySelectorAll(`[data-step-target="${inputId}"]`).forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const step=Number(input.step||1) || 1;
      const delta=Number(btn.dataset.stepDelta||0) * step;
      const min=input.min!==''?Number(input.min):-Infinity;
      const max=input.max!==''?Number(input.max):Infinity;
      const next=Math.max(min, Math.min(max, (Number(input.value)||0) + delta));
      input.value = String(next);
      apply();
      pushHistory();
    });
  });
}

function bindStyleEvents(el){
  const s = el.style;
  // ranges
  ['fontSize','lineHeight','width','radius','thickness','gap','height','letterSpacing','iconSize','borderWidth'].forEach(key=>{
    const node = document.getElementById('f_'+key);
    if(!node) return;
    node.addEventListener('input', ()=>{
      const v = parseFloat(node.value);
      s[key] = v;
      const unitLabel = key==='lineHeight' ? '' : (key==='width' ? '%' : 'px');
      const vnode = document.getElementById('v_'+key);
      if(vnode) vnode.textContent = v + unitLabel;
      reRenderElement(el);
    });
    node.addEventListener('change', ()=> pushHistory());
  });

  // colors
  ['color','bg','iconColor','iconBg','accent','markerColor','borderColor'].forEach(key=>{
    const cnode = document.getElementById('f_'+key);
    const tnode = document.getElementById('t_'+key);
    if(!cnode) return;
    cnode.addEventListener('input', ()=>{ s[key]=cnode.value; tnode.value=cnode.value; reRenderElement(el); });
    cnode.addEventListener('change', ()=> pushHistory());
    tnode.addEventListener('input', ()=>{ s[key]=tnode.value; cnode.value = /^#[0-9A-Fa-f]{6}$/.test(tnode.value) ? tnode.value : cnode.value; reRenderElement(el); });
    tnode.addEventListener('blur', ()=> pushHistory());
  });

  // selects
  ['fontWeight','size','transform','lineStyle'].forEach(key=>{
    const node = document.getElementById('f_'+key);
    if(!node) return;
    node.addEventListener('change', ()=>{ s[key]=node.value; reRenderElement(el); pushHistory(); });
  });

  // align button group
  const alignGroupH = document.getElementById('f_align_h');
  if(alignGroupH){
    alignGroupH.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        alignGroupH.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        s.align = btn.dataset.v;
        reRenderElement(el);
        pushHistory();
      });
    });
  }
  const alignGroupV = document.getElementById('f_align_v');
  if(alignGroupV){
    alignGroupV.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        alignGroupV.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        s.verticalAlign = btn.dataset.v;
        reRenderElement(el);
        pushHistory();
      });
    });
  }
}

function parsePairs(value){
  return (value||'').split('\n').map(line=>line.trim()).filter(Boolean).map(line=>{const i=line.indexOf('|');return i<0?[line,'']:[line.slice(0,i).trim(),line.slice(i+1).trim()]});
}
function safeUrl(url){ return escapeHtml((url||'').trim()); }
function youtubeEmbed(url){
  const value=(url||'').trim();
  const match=value.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{6,})/);
  if(match) return 'https://www.youtube.com/embed/'+match[1];
  if(/vimeo\.com\/(\d+)/.test(value)) return 'https://player.vimeo.com/video/'+value.match(/vimeo\.com\/(\d+)/)[1];
  return value;
}

  const data=event.data||{};
  if(data.type==='MWU_HTML_BUILDER_INIT'){
    loadHostSnapshot(data.payload||{});
    notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState());
    return;
  }
  if(data.type==='MWU_HTML_BUILDER_REQUEST_STATE'){
    notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState());
  }
});
notifyHost('MWU_HTML_BUILDER_READY', { instanceKey: BUILDER_INSTANCE_KEY });

document.querySelector('.side-panel').addEventListener('click',e=>e.stopPropagation());
document.querySelector('.topbar').addEventListener('click',e=>e.stopPropagation());
document.getElementById('modalBox').addEventListener('click',e=>e.stopPropagation());

// Replace demo-only top bar actions with real standalone behaviour.
document.getElementById('saveDraftBtn').addEventListener('click',()=>{saveDraft(false);notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState());});document.getElementById('publishBtn').addEventListener('click',()=>{showPublish();notifyHost('MWU_HTML_BUILDER_STATE', getBridgeState());});document.getElementById('templateBtn').addEventListener('click',showTemplates);document.getElementById('pageSettingsBtn').addEventListener('click',showPageSettings);document.getElementById('helpBtn').addEventListener('click',showHelp);
const exportBtn=document.createElement('button');exportBtn.className='tb-icon-btn';exportBtn.title='Export / import';exportBtn.innerHTML=svgIcon('download',16);exportBtn.addEventListener('click',showExport);document.getElementById('pageSettingsBtn').after(exportBtn);
document.getElementById('zoomSelect').addEventListener('change',e=>{canvasPage.style.transform=`scale(${e.target.value})`;canvasPage.style.marginBottom=`${(Number(e.target.value)-1)*canvasPage.offsetHeight}px`;});

document.addEventListener('keydown',e=>{
  const typing=['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable;if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();saveDraft(false)}
  if(!typing&&(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();undo()}
  if(!typing&&(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'){e.preventDefault();redo()}
  if(!typing&&(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='d'&&selectedId){e.preventDefault();duplicateElement(selectedId)}
  if(!typing&&e.key==='Delete'&&selectedId){e.preventDefault();deleteElement(selectedId)}
  if(e.key==='Escape'){if(document.getElementById('modalBackdrop').classList.contains('open'))closeModal();else if(document.body.classList.contains('preview-mode'))document.getElementById('previewBtn').click();else deselectAll()}
});
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});

// Restore the most recent local draft when available, then refresh enhanced UI.
if(restoreDraft()){
  syncPageSettingsToUi();
  document.querySelectorAll('[data-device]').forEach(b=>b.classList.toggle('active',b.dataset.device===currentDevice));canvasPage.classList.toggle('tablet',currentDevice==='tablet');canvasPage.classList.toggle('mobile',currentDevice==='mobile');
  history=[];historyIndex=-1;_pushHistory();
}
syncPageSettingsToUi();renderPalette(document.getElementById('widgetSearch').value||'');renderAll();updateHistoryButtons();saveDraft(true);

</script>
</body>
